<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6C63FF"/>
      <stop offset="100%" stop-color="#00D9FF"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#6C63FF" flood-opacity="0.5"/>
    </filter>
    <filter id="innerGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feComposite in="blur" in2="SourceGraphic" operator="in"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bg)" filter="url(#shadow)"/>
  <circle cx="256" cy="256" r="240" fill="url(#glow)" opacity="0.4"/>

  <!-- Inner ring -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="white" stroke-opacity="0.15" stroke-width="2"/>

  <!-- Sound waves - left -->
  <path d="M120 216 Q108 256 120 296" stroke="white" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.4"/>
  <path d="M96 200 Q76 256 96 312" stroke="white" stroke-width="3.5" stroke-linecap="round" fill="none" opacity="0.25"/>

  <!-- Sound waves - right -->
  <path d="M392 216 Q404 256 392 296" stroke="white" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.4"/>
  <path d="M416 200 Q436 256 416 312" stroke="white" stroke-width="3.5" stroke-linecap="round" fill="none" opacity="0.25"/>

  <!-- Microphone body -->
  <rect x="220" y="160" width="72" height="120" rx="36" fill="white" filter="url(#shadow)"/>
  <rect x="220" y="160" width="72" height="120" rx="36" fill="url(#glow)" opacity="0.3"/>

  <!-- Microphone grille lines -->
  <line x1="232" y1="200" x2="280" y2="200" stroke="#6C63FF" stroke-width="2" opacity="0.3"/>
  <line x1="232" y1="215" x2="280" y2="215" stroke="#6C63FF" stroke-width="2" opacity="0.3"/>
  <line x1="232" y1="230" x2="280" y2="230" stroke="#6C63FF" stroke-width="2" opacity="0.3"/>
  <line x1="232" y1="245" x2="280" y2="245" stroke="#6C63FF" stroke-width="2" opacity="0.3"/>

  <!-- Microphone arc -->
  <path d="M188 280 Q188 340 256 340 Q324 340 324 280" stroke="white" stroke-width="8" stroke-linecap="round" fill="none"/>

  <!-- Microphone stand -->
  <line x1="256" y1="340" x2="256" y2="370" stroke="white" stroke-width="8" stroke-linecap="round"/>
  <line x1="224" y1="370" x2="288" y2="370" stroke="white" stroke-width="8" stroke-linecap="round"/>

  <!-- Pulse rings (animated effect suggestion) -->
  <circle cx="256" cy="220" r="90" fill="none" stroke="white" stroke-width="1.5" opacity="0.15"/>
  <circle cx="256" cy="220" r="110" fill="none" stroke="white" stroke-width="1" opacity="0.08"/>

  <!-- Nav arrow hint (bottom right) -->
  <g transform="translate(350, 350)">
    <circle r="28" fill="#00D9FF" opacity="0.9"/>
    <path d="M-8 -6 L8 0 L-8 6Z" fill="white"/>
  </g>
</svg>
