<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="30%" style="stop-color:#6366f1"/>
      <stop offset="60%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <radialGradient id="innerGlow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:#c4b5fd;stop-opacity:0.35"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="micBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e0e7ff"/>
    </linearGradient>
    <linearGradient id="waveColor" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c4b5fd;stop-opacity:0.2"/>
      <stop offset="50%" style="stop-color:#e0e7ff;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#c4b5fd;stop-opacity:0.2"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#1e1b4b" flood-opacity="0.4"/>
    </filter>
    <filter id="micGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="248" fill="url(#bg)" filter="url(#shadow)"/>

  <!-- Subtle inner glow -->
  <circle cx="256" cy="256" r="248" fill="url(#innerGlow)"/>

  <!-- Outer ring -->
  <circle cx="256" cy="256" r="230" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>

  <!-- Inner decorative ring -->
  <circle cx="256" cy="256" r="190" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1" stroke-dasharray="4 8"/>

  <!-- Sound waves - left side (3 waves) -->
  <path d="M320 200 Q305 256 320 312" fill="none" stroke="url(#waveColor)" stroke-width="7" stroke-linecap="round" opacity="0.2"/>
  <path d="M298 210 Q288 256 298 302" fill="none" stroke="url(#waveColor)" stroke-width="6" stroke-linecap="round" opacity="0.4"/>
  <path d="M278 222 Q272 256 278 290" fill="none" stroke="url(#waveColor)" stroke-width="5" stroke-linecap="round" opacity="0.65"/>

  <!-- Sound waves - right side (3 waves) -->
  <path d="M192 200 Q207 256 192 312" fill="none" stroke="url(#waveColor)" stroke-width="7" stroke-linecap="round" opacity="0.2"/>
  <path d="M214 210 Q224 256 214 302" fill="none" stroke="url(#waveColor)" stroke-width="6" stroke-linecap="round" opacity="0.4"/>
  <path d="M234 222 Q240 256 234 290" fill="none" stroke="url(#waveColor)" stroke-width="5" stroke-linecap="round" opacity="0.65"/>

  <!-- Microphone body -->
  <g filter="url(#micGlow)">
    <rect x="228" y="170" width="56" height="105" rx="28" fill="url(#micBody)"/>
    <!-- Grille -->
    <line x1="240" y1="202" x2="272" y2="202" stroke="rgba(99,102,241,0.25)" stroke-width="2"/>
    <line x1="240" y1="216" x2="272" y2="216" stroke="rgba(99,102,241,0.25)" stroke-width="2"/>
    <line x1="240" y1="230" x2="272" y2="230" stroke="rgba(99,102,241,0.25)" stroke-width="2"/>
    <line x1="240" y1="244" x2="272" y2="244" stroke="rgba(99,102,241,0.25)" stroke-width="2"/>
    <line x1="240" y1="258" x2="272" y2="258" stroke="rgba(99,102,241,0.25)" stroke-width="2"/>
  </g>

  <!-- Mic arc -->
  <path d="M200 285 Q200 342 256 342 Q312 342 312 285" fill="none" stroke="white" stroke-width="7" stroke-linecap="round"/>
  <!-- Mic stand -->
  <line x1="256" y1="342" x2="256" y2="375" stroke="white" stroke-width="7" stroke-linecap="round"/>
  <!-- Mic base -->
  <line x1="230" y1="375" x2="282" y2="375" stroke="white" stroke-width="7" stroke-linecap="round"/>

  <!-- Recording indicator -->
  <circle cx="256" cy="158" r="8" fill="#ef4444">
    <animate attributeName="r" values="8;10;8" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.5;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Orbiting dot -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="none">
    <animateTransform attributeName="transform" type="rotate" from="0 256 256" to="360 256 256" dur="20s" repeatCount="indefinite"/>
  </circle>
  <circle cx="476" cy="256" r="4" fill="rgba(255,255,255,0.5)">
    <animateTransform attributeName="transform" type="rotate" from="0 256 256" to="360 256 256" dur="20s" repeatCount="indefinite"/>
  </circle>
</svg>
