<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#111133"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <linearGradient id="micGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c7d2fe"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#1e1b4b" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="200" fill="url(#bgGrad)"/>
  <rect width="1024" height="1024" rx="200" fill="url(#centerGlow)"/>

  <!-- Rings -->
  <circle cx="512" cy="430" r="300" fill="none" stroke="url(#ringGrad)" stroke-width="2" opacity="0.15"/>
  <circle cx="512" cy="430" r="240" fill="none" stroke="url(#ringGrad)" stroke-width="1.5" opacity="0.1"/>
  <circle cx="512" cy="430" r="180" fill="none" stroke="#818cf8" stroke-width="1" opacity="0.08"/>

  <!-- Sound waves left -->
  <path d="M240 330 Q210 430 240 530" fill="none" stroke="#818cf8" stroke-width="5" stroke-linecap="round" opacity="0.2"/>
  <path d="M280 350 Q260 430 280 510" fill="none" stroke="#818cf8" stroke-width="4" stroke-linecap="round" opacity="0.35"/>
  <path d="M320 375 Q308 430 320 485" fill="none" stroke="#818cf8" stroke-width="3.5" stroke-linecap="round" opacity="0.5"/>

  <!-- Sound waves right -->
  <path d="M784 330 Q814 430 784 530" fill="none" stroke="#818cf8" stroke-width="5" stroke-linecap="round" opacity="0.2"/>
  <path d="M744 350 Q764 430 744 510" fill="none" stroke="#818cf8" stroke-width="4" stroke-linecap="round" opacity="0.35"/>
  <path d="M704 375 Q716 430 704 485" fill="none" stroke="#818cf8" stroke-width="3.5" stroke-linecap="round" opacity="0.5"/>

  <!-- Microphone -->
  <g filter="url(#glow)">
    <g filter="url(#shadow)">
      <rect x="462" y="300" width="100" height="170" rx="50" fill="url(#micGrad)"/>
    </g>
    <line x1="482" y1="345" x2="542" y2="345" stroke="rgba(99,102,241,0.15)" stroke-width="1.5"/>
    <line x1="482" y1="370" x2="542" y2="370" stroke="rgba(99,102,241,0.15)" stroke-width="1.5"/>
    <line x1="482" y1="395" x2="542" y2="395" stroke="rgba(99,102,241,0.15)" stroke-width="1.5"/>
    <line x1="482" y1="420" x2="542" y2="420" stroke="rgba(99,102,241,0.15)" stroke-width="1.5"/>
    <line x1="482" y1="445" x2="542" y2="445" stroke="rgba(99,102,241,0.15)" stroke-width="1.5"/>
  </g>

  <!-- Arc + stand -->
  <path d="M385 520 Q385 615 512 615 Q639 615 639 520" fill="none" stroke="#a5b4fc" stroke-width="6" stroke-linecap="round"/>
  <line x1="512" y1="615" x2="512" y2="665" stroke="#a5b4fc" stroke-width="6" stroke-linecap="round"/>
  <line x1="470" y1="665" x2="554" y2="665" stroke="#a5b4fc" stroke-width="6" stroke-linecap="round"/>

  <!-- Recording dot -->
  <circle cx="512" cy="280" r="8" fill="#ef4444">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Typography -->
  <text x="512" y="760" text-anchor="middle" font-family="'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="80" font-weight="800" fill="#f8fafc" letter-spacing="6">VOICENAV</text>
  <text x="512" y="800" text-anchor="middle" font-family="'SF Pro Text', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="20" fill="#818cf8" letter-spacing="10" font-weight="500">VOICE BROWSER</text>
  <text x="512" y="840" text-anchor="middle" font-family="'SF Pro Text', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" fill="rgba(248,250,252,0.3)" letter-spacing="3">by HouseDealsGroup</text>
</svg>
