<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="50%" stop-color="#0d0d24"/>
      <stop offset="100%" stop-color="#111133"/>
    </linearGradient>
    <radialGradient id="bgGlow" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#0a0a1a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="micBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e0e7ff"/>
      <stop offset="100%" stop-color="#a5b4fc"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.05"/>
      <stop offset="50%" stop-color="#c7d2fe" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0.05"/>
    </linearGradient>
    <filter id="micShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#312e81" flood-opacity="0.6"/>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="circleClip"><circle cx="512" cy="512" r="480"/></clipPath>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="220" fill="url(#bg)"/>
  <rect width="1024" height="1024" rx="220" fill="url(#bgGlow)"/>

  <!-- Subtle grid texture -->
  <g opacity="0.03" clip-path="url(#circleClip)">
    <line x1="0" y1="0" x2="1024" y2="1024" stroke="white" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="1024" y2="824" stroke="white" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="1024" y2="624" stroke="white" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="1024" y2="424" stroke="white" stroke-width="0.5"/>
    <line x1="800" y1="0" x2="1024" y2="224" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="824" y2="1024" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="400" x2="624" y2="1024" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="600" x2="424" y2="1024" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="800" x2="224" y2="1024" stroke="white" stroke-width="0.5"/>
  </g>

  <!-- Outer precision ring -->
  <circle cx="512" cy="460" r="320" fill="none" stroke="url(#accentLine)" stroke-width="1" opacity="0.15"/>
  <circle cx="512" cy="460" r="320" fill="none" stroke="url(#accentLine)" stroke-width="8" opacity="0.04" stroke-dasharray="2 18"/>

  <!-- Middle ring -->
  <circle cx="512" cy="460" r="260" fill="none" stroke="#818cf8" stroke-width="0.75" opacity="0.1"/>

  <!-- Inner atmosphere -->
  <circle cx="512" cy="440" r="180" fill="#6366f1" opacity="0.04"/>

  <!-- Sound waves — left -->
  <path d="M200 340 Q170 460 200 580" fill="none" stroke="url(#waveGrad)" stroke-width="6" stroke-linecap="round" opacity="0.15"/>
  <path d="M240 360 Q218 460 240 560" fill="none" stroke="url(#waveGrad)" stroke-width="5" stroke-linecap="round" opacity="0.25"/>
  <path d="M280 385 Q265 460 280 535" fill="none" stroke="url(#waveGrad)" stroke-width="4" stroke-linecap="round" opacity="0.4"/>
  <path d="M315 400 Q305 460 315 520" fill="none" stroke="url(#waveGrad)" stroke-width="3.5" stroke-linecap="round" opacity="0.55"/>

  <!-- Sound waves — right -->
  <path d="M824 340 Q854 460 824 580" fill="none" stroke="url(#waveGrad)" stroke-width="6" stroke-linecap="round" opacity="0.15"/>
  <path d="M784 360 Q806 460 784 560" fill="none" stroke="url(#waveGrad)" stroke-width="5" stroke-linecap="round" opacity="0.25"/>
  <path d="M744 385 Q759 460 744 535" fill="none" stroke="url(#waveGrad)" stroke-width="4" stroke-linecap="round" opacity="0.4"/>
  <path d="M709 400 Q719 460 709 520" fill="none" stroke="url(#waveGrad)" stroke-width="3.5" stroke-linecap="round" opacity="0.55"/>

  <!-- Microphone -->
  <g filter="url(#micShadow)">
    <rect x="464" y="320" width="96" height="180" rx="48" fill="url(#micBody)"/>
    <!-- Grille lines -->
    <line x1="484" y1="370" x2="540" y2="370" stroke="rgba(99,102,241,0.2)" stroke-width="1.5"/>
    <line x1="484" y1="395" x2="540" y2="395" stroke="rgba(99,102,241,0.2)" stroke-width="1.5"/>
    <line x1="484" y1="420" x2="540" y2="420" stroke="rgba(99,102,241,0.2)" stroke-width="1.5"/>
    <line x1="484" y1="445" x2="540" y2="445" stroke="rgba(99,102,241,0.2)" stroke-width="1.5"/>
    <line x1="484" y1="470" x2="540" y2="470" stroke="rgba(99,102,241,0.2)" stroke-width="1.5"/>
  </g>

  <!-- Mic arc -->
  <path d="M385 545 Q385 640 512 640 Q639 640 639 545" fill="none" stroke="#c7d2fe" stroke-width="7" stroke-linecap="round" opacity="0.9"/>
  <!-- Stand -->
  <line x1="512" y1="640" x2="512" y2="695" stroke="#c7d2fe" stroke-width="7" stroke-linecap="round" opacity="0.9"/>
  <!-- Base -->
  <line x1="465" y1="695" x2="559" y2="695" stroke="#c7d2fe" stroke-width="7" stroke-linecap="round" opacity="0.9"/>

  <!-- Recording dot -->
  <circle cx="512" cy="300" r="10" fill="#ef4444" opacity="0.9">
    <animate attributeName="r" values="10;13;10" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.9;0.4;0.9" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Accent line at bottom -->
  <rect x="312" y="760" width="400" height="2" rx="1" fill="url(#accentLine)" opacity="0.3"/>

  <!-- Typography -->
  <text x="512" y="810" text-anchor="middle" font-family="'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="72" font-weight="800" fill="#f8fafc" letter-spacing="8">VOICENAV</text>
  <text x="512" y="855" text-anchor="middle" font-family="'SF Pro Text', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="18" fill="#818cf8" letter-spacing="12" font-weight="500">VOICE BROWSER</text>
  <text x="512" y="895" text-anchor="middle" font-family="'SF Pro Text', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" fill="rgba(248,250,252,0.3)" letter-spacing="4">by HouseDealsGroup</text>

  <!-- Orbiting particle -->
  <g>
    <animateTransform attributeName="transform" type="rotate" from="0 512 460" to="360 512 460" dur="30s" repeatCount="indefinite"/>
    <circle cx="832" cy="460" r="3" fill="rgba(129,140,248,0.5)"/>
  </g>
</svg>
