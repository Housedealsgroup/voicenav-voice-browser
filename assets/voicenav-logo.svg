<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0B0B1E"/>
      <stop offset="100%" style="stop-color:#1a1a3e"/>
    </linearGradient>
    <linearGradient id="micGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00E5FF"/>
      <stop offset="100%" style="stop-color:#7C5CFC"/>
    </linearGradient>
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00E5FF;stop-opacity:0.2"/>
      <stop offset="50%" style="stop-color:#00E5FF;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#00E5FF;stop-opacity:0.2"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C5CFC"/>
      <stop offset="50%" style="stop-color:#00E5FF"/>
      <stop offset="100%" style="stop-color:#FF2D78"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bgGrad)"/>

  <!-- Outer ring -->
  <circle cx="256" cy="230" r="160" fill="none" stroke="url(#ringGrad)" stroke-width="3" opacity="0.3"/>

  <!-- Middle ring -->
  <circle cx="256" cy="230" r="120" fill="none" stroke="url(#ringGrad)" stroke-width="2" opacity="0.2"/>

  <!-- Inner glow -->
  <circle cx="256" cy="220" r="80" fill="#7C5CFC" opacity="0.08"/>

  <!-- Sound waves - left -->
  <path d="M120 180 Q100 230 120 280" fill="none" stroke="url(#waveGrad)" stroke-width="4" stroke-linecap="round" opacity="0.4"/>
  <path d="M140 190 Q125 230 140 270" fill="none" stroke="url(#waveGrad)" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  <path d="M160 200 Q150 230 160 260" fill="none" stroke="url(#waveGrad)" stroke-width="4" stroke-linecap="round" opacity="0.8"/>

  <!-- Sound waves - right -->
  <path d="M392 180 Q412 230 392 280" fill="none" stroke="url(#waveGrad)" stroke-width="4" stroke-linecap="round" opacity="0.4"/>
  <path d="M372 190 Q387 230 372 270" fill="none" stroke="url(#waveGrad)" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  <path d="M352 200 Q362 230 352 260" fill="none" stroke="url(#waveGrad)" stroke-width="4" stroke-linecap="round" opacity="0.8"/>

  <!-- Microphone body -->
  <g filter="url(#glow)">
    <rect x="226" y="160" width="60" height="110" rx="30" fill="url(#micGrad)"/>
    <line x1="236" y1="190" x2="276" y2="190" stroke="rgba(0,0,0,0.15)" stroke-width="2"/>
    <line x1="236" y1="205" x2="276" y2="205" stroke="rgba(0,0,0,0.15)" stroke-width="2"/>
    <line x1="236" y1="220" x2="276" y2="220" stroke="rgba(0,0,0,0.15)" stroke-width="2"/>
    <line x1="236" y1="235" x2="276" y2="235" stroke="rgba(0,0,0,0.15)" stroke-width="2"/>
    <line x1="236" y1="250" x2="276" y2="250" stroke="rgba(0,0,0,0.15)" stroke-width="2"/>
  </g>

  <!-- Mic stand arc -->
  <path d="M195 280 Q195 335 256 335 Q317 335 317 280" fill="none" stroke="url(#micGrad)" stroke-width="5" stroke-linecap="round"/>
  <!-- Mic stand line -->
  <line x1="256" y1="335" x2="256" y2="365" stroke="url(#micGrad)" stroke-width="5" stroke-linecap="round"/>
  <!-- Mic base -->
  <line x1="228" y1="365" x2="284" y2="365" stroke="url(#micGrad)" stroke-width="5" stroke-linecap="round"/>

  <!-- Recording indicator -->
  <circle cx="256" cy="150" r="6" fill="#FF2D78">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Brand text -->
  <text x="256" y="420" text-anchor="middle" font-family="'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="48" font-weight="800" fill="white" letter-spacing="4">VOICENAV</text>
  <text x="256" y="452" text-anchor="middle" font-family="'SF Pro Text', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" fill="#00E5FF" letter-spacing="8" font-weight="600">VOICE BROWSER</text>
  <text x="256" y="475" text-anchor="middle" font-family="'SF Pro Text', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" fill="rgba(255,255,255,0.4)" letter-spacing="3">by HouseDealsGroup</text>
</svg>
