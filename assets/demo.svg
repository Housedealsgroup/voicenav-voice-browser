<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="100%" stop-color="#0A0A12"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9B5CFF"/>
      <stop offset="100%" stop-color="#C084FC"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="450" rx="16" fill="url(#bgGrad)"/>

  <!-- Left side: Phone mockup with home screen -->
  <rect x="40" y="30" width="220" height="390" rx="24" fill="#000" stroke="#1A1A3A" stroke-width="2"/>
  <rect x="50" y="50" width="200" height="350" rx="16" fill="#000"/>

  <!-- Mini home screen -->
  <text x="150" y="100" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="16" font-weight="800">VoiceNav</text>
  <text x="150" y="116" text-anchor="middle" fill="#9B5CFF" font-family="system-ui, sans-serif" font-size="8">Voice Browser — 222 Languages</text>

  <!-- Mini mic button -->
  <circle cx="150" cy="160" r="24" fill="#9B5CFF" filter="url(#glow)"/>
  <rect x="144" y="148" width="12" height="18" rx="6" fill="white"/>
  <path d="M140 164 a8 8 0 0016 0" stroke="white" stroke-width="1.5" fill="none"/>

  <!-- Mini search bar -->
  <rect x="65" y="200" width="170" height="24" rx="12" fill="#0A0A12" stroke="#1A1A3A" stroke-width="1"/>
  <text x="80" y="216" fill="#6a5a8a" font-family="system-ui, sans-serif" font-size="8">Search or type a URL...</text>

  <!-- Mini quick links -->
  <rect x="65" y="236" width="50" height="32" rx="6" fill="#0A0A12" stroke="#1A1A3A" stroke-width="0.5"/>
  <text x="90" y="256" text-anchor="middle" fill="#c0b0d0" font-family="system-ui, sans-serif" font-size="7">Google</text>
  <rect x="120" y="236" width="50" height="32" rx="6" fill="#0A0A12" stroke="#1A1A3A" stroke-width="0.5"/>
  <text x="145" y="256" text-anchor="middle" fill="#c0b0d0" font-family="system-ui, sans-serif" font-size="7">YouTube</text>
  <rect x="175" y="236" width="50" height="32" rx="6" fill="#0A0A12" stroke="#1A1A3A" stroke-width="0.5"/>
  <text x="200" y="256" text-anchor="middle" fill="#c0b0d0" font-family="system-ui, sans-serif" font-size="7">Wikipedia</text>

  <!-- Right side: Browser view mockup -->
  <rect x="300" y="30" width="460" height="390" rx="24" fill="#000" stroke="#1A1A3A" stroke-width="2"/>
  <rect x="310" y="50" width="440" height="350" rx="16" fill="#000"/>

  <!-- Mini header -->
  <rect x="310" y="50" width="440" height="32" fill="#0A0A12"/>
  <rect x="320" y="56" width="20" height="20" rx="4" fill="transparent"/>
  <rect x="326" y="58" width="4" height="8" rx="2" stroke="#9B5CFF" stroke-width="1" fill="none"/>
  <path d="M323 64 a4 4 0 008 0" stroke="#9B5CFF" stroke-width="1" fill="none"/>
  <path d="M350 64 h-6 m3-3 l-3 3 3 3" stroke="#c0b0d0" stroke-width="1" fill="none"/>
  <path d="M364 64 h6 m-3-3 l3 3-3 3" stroke="#c0b0d0" stroke-width="1" fill="none"/>
  <rect x="380" y="56" width="200" height="20" rx="10" fill="#000" stroke="#1A1A3A" stroke-width="0.5"/>
  <rect x="388" y="62" width="6" height="5" rx="1" stroke="#00E676" stroke-width="0.8" fill="none"/>
  <text x="400" y="70" fill="#c0b0d0" font-family="system-ui, sans-serif" font-size="8">example.com</text>
  <path d="M600 60 v12 l-3-2-3 2 v-12 a1.5 1.5 0 013-1h0a1.5 1.5 0 013 1z" stroke="#c0b0d0" stroke-width="1" fill="none"/>
  <path d="M620 62 l-2 2 h-2 v4 h2 l2 2 v-8z" stroke="#c0b0d0" stroke-width="1" fill="none"/>

  <!-- Mini tab bar -->
  <rect x="310" y="82" width="440" height="22" fill="#000"/>
  <rect x="316" y="85" width="100" height="18" rx="4" fill="#12122A" stroke="#9B5CFF" stroke-width="0.5"/>
  <text x="324" y="97" fill="#fff" font-family="system-ui, sans-serif" font-size="7">Example Domain</text>

  <!-- Mini iframe content -->
  <rect x="310" y="104" width="440" height="276" fill="white"/>
  <text x="325" y="130" fill="#333" font-family="Georgia, serif" font-size="12" font-weight="700">Example Domain</text>
  <rect x="325" y="138" width="400" height="0.5" fill="#e0e0e0"/>
  <text x="325" y="155" fill="#555" font-family="Georgia, serif" font-size="9">This domain is for use in illustrative examples in documents.</text>
  <text x="325" y="168" fill="#555" font-family="Georgia, serif" font-size="9">You may use this domain in literature without prior coordination.</text>
  <text x="325" y="186" fill="#3882F6" font-family="Georgia, serif" font-size="9">More information...</text>

  <!-- Voice overlay indicator on right side -->
  <rect x="380" y="220" width="300" height="80" rx="12" fill="rgba(0,0,0,0.85)" stroke="#9B5CFF" stroke-width="1"/>
  <circle cx="410" cy="260" r="16" fill="#9B5CFF"/>
  <rect x="405" y="250" width="10" height="14" rx="5" fill="white"/>
  <path d="M402 258 a6 6 0 0012 0" stroke="white" stroke-width="1.2" fill="none"/>
  <text x="440" y="252" fill="#fff" font-family="system-ui, sans-serif" font-size="10" font-weight="600">Listening...</text>
  <text x="440" y="270" fill="#6a5a8a" font-family="system-ui, sans-serif" font-size="8" font-style="italic">Go to youtube.com</text>
  <rect x="440" y="278" width="120" height="3" rx="1.5" fill="#12122A"/>
  <rect x="440" y="278" width="96" height="3" rx="1.5" fill="#9B5CFF"/>

  <!-- Bottom bar -->
  <rect x="310" y="380" width="440" height="20" fill="#0A0A12"/>
  <text x="530" y="394" text-anchor="middle" fill="#6a5a8a" font-family="system-ui, sans-serif" font-size="7">VoiceNav Voice Browser — 222 Languages — 100% Client-Side</text>
</svg>
