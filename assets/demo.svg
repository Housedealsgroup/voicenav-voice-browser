<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 780" width="400" height="780">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0B0B1E"/>
      <stop offset="50%" style="stop-color:#0f0f28"/>
      <stop offset="100%" style="stop-color:#141432"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C5CFC"/>
      <stop offset="100%" style="stop-color:#00E5FF"/>
    </linearGradient>
    <linearGradient id="micGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF2D78"/>
      <stop offset="100%" style="stop-color:#FF6B9D"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#13132D"/>
      <stop offset="100%" style="stop-color:#0f0f28"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="400" height="780" rx="32" fill="url(#bg)"/>

  <!-- Status bar -->
  <text x="28" y="32" fill="rgba(255,255,255,0.5)" font-family="system-ui" font-size="13" font-weight="600">9:41</text>
  <circle cx="365" cy="27" r="5" fill="rgba(255,255,255,0.3)"/>

  <!-- Logo with mic icon -->
  <circle cx="200" cy="60" r="22" fill="#7C5CFC" opacity="0.15"/>
  <rect x="192" y="45" width="16" height="24" rx="8" fill="url(#accentGrad)"/>
  <path d="M188 68 Q188 78 200 78 Q212 78 212 68" fill="none" stroke="url(#accentGrad)" stroke-width="2" stroke-linecap="round"/>
  <line x1="200" y1="78" x2="200" y2="83" stroke="url(#accentGrad)" stroke-width="2" stroke-linecap="round"/>

  <text x="200" y="108" text-anchor="middle" fill="white" font-family="system-ui" font-size="22" font-weight="800" letter-spacing="1">VoiceNav</text>
  <text x="200" y="126" text-anchor="middle" fill="#00E5FF" font-family="system-ui" font-size="10" letter-spacing="3" font-weight="600">v10 — VOICE BROWSER</text>

  <!-- Browser area -->
  <rect x="16" y="140" width="368" height="260" rx="16" fill="url(#cardGrad)" stroke="rgba(124,92,252,0.15)" stroke-width="1"/>

  <!-- URL bar -->
  <rect x="28" y="154" width="344" height="38" rx="10" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <circle cx="48" cy="173" r="6" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <text x="62" y="177" fill="rgba(255,255,255,0.35)" font-family="monospace" font-size="13">amazon.com/headphones</text>

  <!-- Product card -->
  <rect x="28" y="202" width="344" height="80" rx="10" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <rect x="40" y="214" width="56" height="56" rx="8" fill="rgba(124,92,252,0.15)"/>
  <rect x="108" y="218" width="140" height="12" rx="4" fill="rgba(255,255,255,0.15)"/>
  <rect x="108" y="236" width="200" height="8" rx="3" fill="rgba(255,255,255,0.06)"/>
  <rect x="108" y="250" width="100" height="8" rx="3" fill="rgba(255,255,255,0.06)"/>
  <text x="108" y="272" fill="#00E5FF" font-family="system-ui" font-size="14" font-weight="700">$79.99</text>
  <text x="188" y="272" fill="rgba(255,255,255,0.25)" font-family="system-ui" font-size="11" text-decoration="line-through">$129.99</text>

  <!-- AI Analysis badge -->
  <rect x="250" y="214" width="110" height="24" rx="12" fill="rgba(0,229,255,0.15)" stroke="rgba(0,229,255,0.3)" stroke-width="1"/>
  <text x="305" y="230" text-anchor="middle" fill="#00E5FF" font-family="system-ui" font-size="10" font-weight="600">4.5 (2,341 reviews)</text>

  <!-- Action buttons -->
  <rect x="28" y="294" width="165" height="36" rx="10" fill="rgba(255,153,0,0.2)" stroke="rgba(255,153,0,0.3)" stroke-width="1"/>
  <text x="110" y="317" text-anchor="middle" fill="#FF9900" font-family="system-ui" font-size="12" font-weight="600">Add to Cart</text>
  <rect x="205" y="294" width="165" height="36" rx="10" fill="rgba(0,229,255,0.1)" stroke="rgba(0,229,255,0.2)" stroke-width="1"/>
  <text x="287" y="317" text-anchor="middle" fill="#00E5FF" font-family="system-ui" font-size="12" font-weight="600">Compare Prices</text>

  <!-- Voice Assistant Panel -->
  <rect x="16" y="416" width="368" height="220" rx="16" fill="url(#cardGrad)" stroke="rgba(124,92,252,0.2)" stroke-width="1"/>

  <!-- Assistant header -->
  <circle cx="40" cy="438" r="14" fill="url(#accentGrad)"/>
  <text x="40" y="443" text-anchor="middle" fill="white" font-family="system-ui" font-size="12" font-weight="700">AI</text>
  <text x="62" y="443" fill="white" font-family="system-ui" font-size="13" font-weight="600">VoiceNav Assistant</text>
  <circle cx="356" cy="438" r="4" fill="#00E676">
    <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Chat messages -->
  <rect x="28" y="458" width="260" height="36" rx="12" fill="rgba(124,92,252,0.12)"/>
  <text x="40" y="480" fill="rgba(255,255,255,0.7)" font-family="system-ui" font-size="12">Found 2,341 headphones</text>

  <rect x="108" y="502" width="268" height="36" rx="12" fill="rgba(0,229,255,0.12)"/>
  <text x="120" y="524" fill="#00E5FF" font-family="system-ui" font-size="12">Top rated: Sony WH-1000XM5 — $79.99</text>

  <rect x="28" y="546" width="220" height="36" rx="12" fill="rgba(124,92,252,0.12)"/>
  <text x="40" y="568" fill="rgba(255,255,255,0.7)" font-family="system-ui" font-size="12">Added to cart. Checkout?</text>

  <!-- Smart suggestions -->
  <text x="28" y="610" fill="rgba(255,255,255,0.3)" font-family="system-ui" font-size="10" letter-spacing="1">SUGGESTIONS</text>
  <rect x="28" y="618" width="100" height="28" rx="14" fill="rgba(255,45,120,0.15)" stroke="rgba(255,45,120,0.3)" stroke-width="1"/>
  <text x="78" y="636" text-anchor="middle" fill="#FF2D78" font-family="system-ui" font-size="11">Checkout</text>
  <rect x="136" y="618" width="110" height="28" rx="14" fill="rgba(0,229,255,0.15)" stroke="rgba(0,229,255,0.3)" stroke-width="1"/>
  <text x="191" y="636" text-anchor="middle" fill="#00E5FF" font-family="system-ui" font-size="11">Compare more</text>
  <rect x="254" y="618" width="100" height="28" rx="14" fill="rgba(124,92,252,0.15)" stroke="rgba(124,92,252,0.3)" stroke-width="1"/>
  <text x="304" y="636" text-anchor="middle" fill="#7C5CFC" font-family="system-ui" font-size="11">Read reviews</text>

  <!-- Waveform area -->
  <rect x="16" y="660" width="368" height="60" rx="16" fill="url(#cardGrad)" stroke="rgba(124,92,252,0.15)" stroke-width="1"/>

  <!-- Animated waveform -->
  <g filter="url(#glow)">
    <rect x="100" y="680" width="3" height="16" rx="1.5" fill="#00E5FF"><animate attributeName="height" values="16;32;16" dur="0.8s" repeatCount="indefinite"/><animate attributeName="y" values="680;672;680" dur="0.8s" repeatCount="indefinite"/></rect>
    <rect x="110" y="676" width="3" height="24" rx="1.5" fill="#7C5CFC"><animate attributeName="height" values="24;40;24" dur="0.6s" repeatCount="indefinite"/><animate attributeName="y" values="676;668;676" dur="0.6s" repeatCount="indefinite"/></rect>
    <rect x="120" y="672" width="3" height="32" rx="1.5" fill="#00E5FF"><animate attributeName="height" values="32;48;32" dur="0.7s" repeatCount="indefinite"/><animate attributeName="y" values="672;664;672" dur="0.7s" repeatCount="indefinite"/></rect>
    <rect x="130" y="668" width="3" height="40" rx="1.5" fill="#7C5CFC"><animate attributeName="height" values="40;52;40" dur="0.5s" repeatCount="indefinite"/><animate attributeName="y" values="668;662;668" dur="0.5s" repeatCount="indefinite"/></rect>
    <rect x="140" y="672" width="3" height="32" rx="1.5" fill="#00E5FF"><animate attributeName="height" values="32;44;32" dur="0.9s" repeatCount="indefinite"/><animate attributeName="y" values="672;666;672" dur="0.9s" repeatCount="indefinite"/></rect>
    <rect x="150" y="676" width="3" height="24" rx="1.5" fill="#7C5CFC"><animate attributeName="height" values="24;36;24" dur="0.65s" repeatCount="indefinite"/><animate attributeName="y" values="676;670;676" dur="0.65s" repeatCount="indefinite"/></rect>
    <rect x="160" y="680" width="3" height="16" rx="1.5" fill="#00E5FF"><animate attributeName="height" values="16;28;16" dur="0.75s" repeatCount="indefinite"/><animate attributeName="y" values="680;674;680" dur="0.75s" repeatCount="indefinite"/></rect>

    <!-- Center mic -->
    <circle cx="200" cy="690" r="16" fill="url(#micGrad)"><animate attributeName="r" values="16;18;16" dur="1.5s" repeatCount="indefinite"/></circle>
    <circle cx="200" cy="690" r="16" fill="none" stroke="#FF2D78" stroke-width="1.5" opacity="0.5"><animate attributeName="r" values="16;24;16" dur="1.5s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.5;0;0.5" dur="1.5s" repeatCount="indefinite"/></circle>
    <path d="M200,682 L200,690 M194,686 L194,682 C194,677 206,677 206,682 L206,686 M191,690 L209,690 M200,690 L200,695" stroke="white" stroke-width="1.8" fill="none" stroke-linecap="round"/>

    <rect x="230" y="680" width="3" height="16" rx="1.5" fill="#00E5FF"><animate attributeName="height" values="16;28;16" dur="0.7s" repeatCount="indefinite"/><animate attributeName="y" values="680;674;680" dur="0.7s" repeatCount="indefinite"/></rect>
    <rect x="240" y="676" width="3" height="24" rx="1.5" fill="#7C5CFC"><animate attributeName="height" values="24;36;24" dur="0.55s" repeatCount="indefinite"/><animate attributeName="y" values="676;670;676" dur="0.55s" repeatCount="indefinite"/></rect>
    <rect x="250" y="672" width="3" height="32" rx="1.5" fill="#00E5FF"><animate attributeName="height" values="32;44;32" dur="0.85s" repeatCount="indefinite"/><animate attributeName="y" values="672;666;672" dur="0.85s" repeatCount="indefinite"/></rect>
    <rect x="260" y="668" width="3" height="40" rx="1.5" fill="#7C5CFC"><animate attributeName="height" values="40;52;40" dur="0.6s" repeatCount="indefinite"/><animate attributeName="y" values="668;662;668" dur="0.6s" repeatCount="indefinite"/></rect>
    <rect x="270" y="672" width="3" height="32" rx="1.5" fill="#00E5FF"><animate attributeName="height" values="32;48;32" dur="0.75s" repeatCount="indefinite"/><animate attributeName="y" values="672;664;672" dur="0.75s" repeatCount="indefinite"/></rect>
    <rect x="280" y="676" width="3" height="24" rx="1.5" fill="#7C5CFC"><animate attributeName="height" values="24;40;24" dur="0.65s" repeatCount="indefinite"/><animate attributeName="y" values="676;668;676" dur="0.65s" repeatCount="indefinite"/></rect>
    <rect x="290" y="680" width="3" height="16" rx="1.5" fill="#00E5FF"><animate attributeName="height" values="16;32;16" dur="0.8s" repeatCount="indefinite"/><animate attributeName="y" values="680;672;680" dur="0.8s" repeatCount="indefinite"/></rect>
  </g>

  <!-- Voice command display -->
  <text x="200" y="740" text-anchor="middle" fill="#00E5FF" font-family="monospace" font-size="14" font-weight="600" opacity="0">
    "add it to cart"
    <animate attributeName="opacity" values="0;0;1;1;0" dur="4s" repeatCount="indefinite"/>
  </text>
  <text x="200" y="740" text-anchor="middle" fill="#7C5CFC" font-family="monospace" font-size="14" font-weight="600">
    "search for headphones"
    <animate attributeName="opacity" values="1;1;0;0;0" dur="4s" repeatCount="indefinite"/>
  </text>

  <!-- Version badge -->
  <rect x="140" y="758" width="120" height="20" rx="10" fill="rgba(124,92,252,0.15)" stroke="rgba(124,92,252,0.2)" stroke-width="1"/>
  <text x="200" y="772" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-family="system-ui" font-size="9" letter-spacing="1">29 LANGUAGES</text>
</svg>
