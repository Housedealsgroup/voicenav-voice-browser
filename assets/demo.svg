<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 780" width="400" height="780">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="50%" style="stop-color:#0f0f2e"/>
      <stop offset="100%" style="stop-color:#141432"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <linearGradient id="micGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a3e"/>
      <stop offset="100%" style="stop-color:#12122a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#6366f1" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Phone frame background -->
  <rect width="400" height="780" rx="32" fill="url(#bg)"/>

  <!-- Status bar -->
  <text x="28" y="32" fill="rgba(255,255,255,0.5)" font-family="system-ui" font-size="13" font-weight="600">9:41</text>
  <circle cx="365" cy="27" r="5" fill="rgba(255,255,255,0.3)"/>
  <circle cx="350" cy="27" r="5" fill="rgba(255,255,255,0.3)"/>

  <!-- Header -->
  <text x="200" y="68" text-anchor="middle" fill="white" font-family="system-ui, -apple-system" font-size="22" font-weight="700" letter-spacing="1">VoiceNav</text>
  <text x="200" y="88" text-anchor="middle" fill="#a78bfa" font-family="system-ui" font-size="11" letter-spacing="3">VOICE BROWSER</text>

  <!-- Browser area -->
  <rect x="16" y="100" width="368" height="260" rx="16" fill="url(#cardGrad)" stroke="rgba(99,102,241,0.15)" stroke-width="1"/>

  <!-- URL bar -->
  <rect x="28" y="114" width="344" height="38" rx="10" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <circle cx="48" cy="133" r="6" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <text x="62" y="137" fill="rgba(255,255,255,0.35)" font-family="monospace" font-size="13">amazon.com/headphones</text>

  <!-- Page content - product card -->
  <rect x="28" y="162" width="344" height="80" rx="10" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <rect x="40" y="174" width="56" height="56" rx="8" fill="rgba(99,102,241,0.15)"/>
  <rect x="108" y="178" width="140" height="12" rx="4" fill="rgba(255,255,255,0.15)"/>
  <rect x="108" y="196" width="200" height="8" rx="3" fill="rgba(255,255,255,0.06)"/>
  <rect x="108" y="210" width="100" height="8" rx="3" fill="rgba(255,255,255,0.06)"/>
  <text x="108" y="232" fill="#a78bfa" font-family="system-ui" font-size="14" font-weight="700">$79.99</text>
  <text x="188" y="232" fill="rgba(255,255,255,0.25)" font-family="system-ui" font-size="11" text-decoration="line-through">$129.99</text>

  <!-- AI Analysis badge -->
  <rect x="250" y="174" width="110" height="24" rx="12" fill="rgba(99,102,241,0.2)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
  <text x="305" y="190" text-anchor="middle" fill="#a78bfa" font-family="system-ui" font-size="10" font-weight="600">4.5 (2,341 reviews)</text>

  <!-- Search results -->
  <rect x="28" y="254" width="344" height="42" rx="8" fill="rgba(255,255,255,0.02)"/>
  <text x="40" y="272" fill="rgba(255,255,255,0.4)" font-family="system-ui" font-size="11">Add to Cart</text>
  <rect x="150" y="260" width="60" height="20" rx="10" fill="rgba(99,102,241,0.3)"/>
  <text x="180" y="274" text-anchor="middle" fill="white" font-family="system-ui" font-size="10" font-weight="600">BUY</text>

  <rect x="28" y="304" width="344" height="42" rx="8" fill="rgba(255,255,255,0.02)"/>
  <text x="40" y="322" fill="rgba(255,255,255,0.3)" font-family="system-ui" font-size="11">Compare prices across stores...</text>

  <!-- Voice Assistant Panel -->
  <rect x="16" y="376" width="368" height="260" rx="16" fill="url(#cardGrad)" stroke="rgba(99,102,241,0.2)" stroke-width="1" filter="url(#cardShadow)"/>

  <!-- Assistant header -->
  <circle cx="40" cy="398" r="14" fill="url(#accentGrad)"/>
  <text x="40" y="403" text-anchor="middle" fill="white" font-family="system-ui" font-size="12" font-weight="700">AI</text>
  <text x="62" y="403" fill="white" font-family="system-ui" font-size="13" font-weight="600">Voice Assistant</text>
  <circle cx="356" cy="398" r="4" fill="#22c55e">
    <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Chat messages -->
  <rect x="28" y="418" width="260" height="36" rx="12" fill="rgba(99,102,241,0.12)"/>
  <text x="40" y="440" fill="rgba(255,255,255,0.7)" font-family="system-ui" font-size="12">Found 2,341 headphones</text>

  <rect x="108" y="462" width="268" height="36" rx="12" fill="rgba(99,102,241,0.2)"/>
  <text x="120" y="484" fill="#c4b5fd" font-family="system-ui" font-size="12">Top rated: Sony WH-1000XM5 — $79.99</text>

  <rect x="28" y="506" width="220" height="36" rx="12" fill="rgba(99,102,241,0.12)"/>
  <text x="40" y="528" fill="rgba(255,255,255,0.7)" font-family="system-ui" font-size="12">Added to cart. Checkout?</text>

  <!-- Smart suggestions -->
  <text x="28" y="570" fill="rgba(255,255,255,0.3)" font-family="system-ui" font-size="10" letter-spacing="1">SUGGESTIONS</text>
  <rect x="28" y="578" width="100" height="28" rx="14" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
  <text x="78" y="596" text-anchor="middle" fill="#a78bfa" font-family="system-ui" font-size="11">Checkout</text>
  <rect x="136" y="578" width="110" height="28" rx="14" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
  <text x="191" y="596" text-anchor="middle" fill="#a78bfa" font-family="system-ui" font-size="11">Compare more</text>
  <rect x="254" y="578" width="90" height="28" rx="14" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
  <text x="299" y="596" text-anchor="middle" fill="#a78bfa" font-family="system-ui" font-size="11">Read reviews</text>

  <!-- Waveform area -->
  <rect x="16" y="650" width="368" height="60" rx="16" fill="url(#cardGrad)" stroke="rgba(99,102,241,0.15)" stroke-width="1"/>

  <!-- Animated waveform -->
  <g filter="url(#glow)">
    <rect x="100" y="670" width="3" height="16" rx="1.5" fill="#6366f1"><animate attributeName="height" values="16;32;16" dur="0.8s" repeatCount="indefinite"/><animate attributeName="y" values="670;662;670" dur="0.8s" repeatCount="indefinite"/></rect>
    <rect x="110" y="666" width="3" height="24" rx="1.5" fill="#7c3aed"><animate attributeName="height" values="24;40;24" dur="0.6s" repeatCount="indefinite"/><animate attributeName="y" values="666;658;666" dur="0.6s" repeatCount="indefinite"/></rect>
    <rect x="120" y="662" width="3" height="32" rx="1.5" fill="#8b5cf6"><animate attributeName="height" values="32;48;32" dur="0.7s" repeatCount="indefinite"/><animate attributeName="y" values="662;654;662" dur="0.7s" repeatCount="indefinite"/></rect>
    <rect x="130" y="658" width="3" height="40" rx="1.5" fill="#a78bfa"><animate attributeName="height" values="40;52;40" dur="0.5s" repeatCount="indefinite"/><animate attributeName="y" values="658;652;658" dur="0.5s" repeatCount="indefinite"/></rect>
    <rect x="140" y="662" width="3" height="32" rx="1.5" fill="#c4b5fd"><animate attributeName="height" values="32;44;32" dur="0.9s" repeatCount="indefinite"/><animate attributeName="y" values="662;656;662" dur="0.9s" repeatCount="indefinite"/></rect>
    <rect x="150" y="666" width="3" height="24" rx="1.5" fill="#8b5cf6"><animate attributeName="height" values="24;36;24" dur="0.65s" repeatCount="indefinite"/><animate attributeName="y" values="666;660;666" dur="0.65s" repeatCount="indefinite"/></rect>
    <rect x="160" y="670" width="3" height="16" rx="1.5" fill="#6366f1"><animate attributeName="height" values="16;28;16" dur="0.75s" repeatCount="indefinite"/><animate attributeName="y" values="670;664;670" dur="0.75s" repeatCount="indefinite"/></rect>

    <!-- Center mic -->
    <circle cx="200" cy="680" r="16" fill="url(#micGrad)"><animate attributeName="r" values="16;18;16" dur="1.5s" repeatCount="indefinite"/></circle>
    <circle cx="200" cy="680" r="16" fill="none" stroke="#6366f1" stroke-width="1.5" opacity="0.5"><animate attributeName="r" values="16;24;16" dur="1.5s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.5;0;0.5" dur="1.5s" repeatCount="indefinite"/></circle>
    <path d="M200,672 L200,680 M194,676 L194,672 C194,667 206,667 206,672 L206,676 M191,680 L209,680 M200,680 L200,685" stroke="white" stroke-width="1.8" fill="none" stroke-linecap="round"/>

    <rect x="230" y="670" width="3" height="16" rx="1.5" fill="#6366f1"><animate attributeName="height" values="16;28;16" dur="0.7s" repeatCount="indefinite"/><animate attributeName="y" values="670;664;670" dur="0.7s" repeatCount="indefinite"/></rect>
    <rect x="240" y="666" width="3" height="24" rx="1.5" fill="#7c3aed"><animate attributeName="height" values="24;36;24" dur="0.55s" repeatCount="indefinite"/><animate attributeName="y" values="666;660;666" dur="0.55s" repeatCount="indefinite"/></rect>
    <rect x="250" y="662" width="3" height="32" rx="1.5" fill="#8b5cf6"><animate attributeName="height" values="32;44;32" dur="0.85s" repeatCount="indefinite"/><animate attributeName="y" values="662;656;662" dur="0.85s" repeatCount="indefinite"/></rect>
    <rect x="260" y="658" width="3" height="40" rx="1.5" fill="#a78bfa"><animate attributeName="height" values="40;52;40" dur="0.6s" repeatCount="indefinite"/><animate attributeName="y" values="658;652;658" dur="0.6s" repeatCount="indefinite"/></rect>
    <rect x="270" y="662" width="3" height="32" rx="1.5" fill="#c4b5fd"><animate attributeName="height" values="32;48;32" dur="0.75s" repeatCount="indefinite"/><animate attributeName="y" values="662;654;662" dur="0.75s" repeatCount="indefinite"/></rect>
    <rect x="280" y="666" width="3" height="24" rx="1.5" fill="#8b5cf6"><animate attributeName="height" values="24;40;24" dur="0.65s" repeatCount="indefinite"/><animate attributeName="y" values="666;658;666" dur="0.65s" repeatCount="indefinite"/></rect>
    <rect x="290" y="670" width="3" height="16" rx="1.5" fill="#6366f1"><animate attributeName="height" values="16;32;16" dur="0.8s" repeatCount="indefinite"/><animate attributeName="y" values="670;662;670" dur="0.8s" repeatCount="indefinite"/></rect>
  </g>

  <!-- Voice command display -->
  <text x="200" y="730" text-anchor="middle" fill="#a78bfa" font-family="monospace" font-size="14" font-weight="600" opacity="0">
    "add it to cart"
    <animate attributeName="opacity" values="0;0;1;1;0" dur="4s" repeatCount="indefinite"/>
  </text>
  <text x="200" y="730" text-anchor="middle" fill="#6366f1" font-family="monospace" font-size="14" font-weight="600">
    "search for headphones"
    <animate attributeName="opacity" values="1;1;0;0;0" dur="4s" repeatCount="indefinite"/>
  </text>

  <!-- Language badge -->
  <rect x="140" y="748" width="120" height="20" rx="10" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.2)" stroke-width="1"/>
  <text x="200" y="762" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-family="system-ui" font-size="9" letter-spacing="1">29 LANGUAGES</text>
</svg>
