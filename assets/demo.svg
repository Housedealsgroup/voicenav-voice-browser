<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1560" width="800" height="1560">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#080818"/>
      <stop offset="50%" stop-color="#0a0a1f"/>
      <stop offset="100%" stop-color="#0c0c26"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="micGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e11d48"/>
      <stop offset="100%" stop-color="#f43f5e"/>
    </linearGradient>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(30,27,75,0.6)"/>
      <stop offset="100%" stop-color="rgba(15,15,40,0.8)"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="frost">
      <feGaussianBlur stdDeviation="0.5"/>
    </filter>
  </defs>

  <rect width="800" height="1560" rx="60" fill="url(#bg)"/>

  <!-- Status bar -->
  <text x="48" y="52" fill="rgba(248,250,252,0.5)" font-family="'SF Pro Text', -apple-system, system-ui, sans-serif" font-size="22" font-weight="600">9:41</text>
  <g transform="translate(700,38)">
    <rect x="0" y="4" width="22" height="12" rx="3" fill="none" stroke="rgba(248,250,252,0.3)" stroke-width="1.5"/>
    <rect x="2" y="6" width="14" height="8" rx="1.5" fill="rgba(248,250,252,0.3)"/>
    <rect x="24" y="7" width="2" height="6" rx="1" fill="rgba(248,250,252,0.2)"/>
  </g>

  <!-- Header badge -->
  <rect x="280" y="70" width="240" height="36" rx="18" fill="rgba(99,102,241,0.1)" stroke="rgba(99,102,241,0.2)" stroke-width="1"/>
  <text x="400" y="94" text-anchor="middle" fill="#818cf8" font-family="'SF Pro Text', system-ui, sans-serif" font-size="14" font-weight="600" letter-spacing="2">v11 — 116 LANGUAGES</text>

  <!-- Browser card -->
  <g filter="url(#cardShadow)">
    <rect x="32" y="130" width="736" height="520" rx="24" fill="url(#cardBg)" stroke="rgba(99,102,241,0.12)" stroke-width="1"/>
  </g>

  <!-- URL bar -->
  <rect x="56" y="155" width="688" height="52" rx="14" fill="rgba(248,250,252,0.04)" stroke="rgba(248,250,252,0.06)" stroke-width="1"/>
  <circle cx="88" cy="181" r="8" fill="none" stroke="rgba(248,250,252,0.25)" stroke-width="1.5"/>
  <line x1="93" y1="186" x2="98" y2="191" stroke="rgba(248,250,252,0.25)" stroke-width="1.5" stroke-linecap="round"/>
  <text x="112" y="186" fill="rgba(248,250,252,0.3)" font-family="'SF Mono', monospace" font-size="18">amazon.com/headphones</text>

  <!-- Product section -->
  <rect x="56" y="225" width="688" height="140" rx="16" fill="rgba(248,250,252,0.02)" stroke="rgba(248,250,252,0.04)" stroke-width="1"/>

  <!-- Product image placeholder -->
  <rect x="76" y="245" width="100" height="100" rx="12" fill="rgba(99,102,241,0.08)"/>
  <g transform="translate(106,275)">
    <rect x="0" y="10" width="40" height="30" rx="4" fill="rgba(99,102,241,0.15)"/>
    <circle cx="20" cy="20" r="12" fill="none" stroke="rgba(99,102,241,0.25)" stroke-width="1.5"/>
  </g>

  <!-- Product info -->
  <text x="196" y="268" fill="#f8fafc" font-family="'SF Pro Text', system-ui, sans-serif" font-size="22" font-weight="700">Sony WH-1000XM5</text>
  <text x="196" y="292" fill="rgba(248,250,252,0.4)" font-family="'SF Pro Text', system-ui, sans-serif" font-size="15">Wireless Noise Canceling Headphones</text>
  <text x="196" y="322" fill="#22d3ee" font-family="'SF Pro Text', system-ui, sans-serif" font-size="26" font-weight="800">$79.99</text>
  <text x="310" y="322" fill="rgba(248,250,252,0.2)" font-family="'SF Pro Text', system-ui, sans-serif" font-size="16" text-decoration="line-through">$129.99</text>

  <!-- Rating badge -->
  <rect x="560" y="248" width="160" height="32" rx="16" fill="rgba(245,158,11,0.1)" stroke="rgba(245,158,11,0.2)" stroke-width="1"/>
  <text x="640" y="270" text-anchor="middle" fill="#fbbf24" font-family="'SF Pro Text', system-ui, sans-serif" font-size="14" font-weight="600">4.5 (2,341 reviews)</text>

  <!-- AI Analysis -->
  <rect x="560" y="290" width="160" height="32" rx="16" fill="rgba(6,182,212,0.1)" stroke="rgba(6,182,212,0.2)" stroke-width="1"/>
  <text x="640" y="312" text-anchor="middle" fill="#22d3ee" font-family="'SF Pro Text', system-ui, sans-serif" font-size="13" font-weight="600">AI Analysis Ready</text>

  <!-- Action buttons -->
  <rect x="56" y="385" width="330" height="48" rx="14" fill="rgba(245,158,11,0.15)" stroke="rgba(245,158,11,0.25)" stroke-width="1"/>
  <text x="221" y="415" text-anchor="middle" fill="#fbbf24" font-family="'SF Pro Text', system-ui, sans-serif" font-size="17" font-weight="700">Add to Cart</text>
  <rect x="406" y="385" width="314" height="48" rx="14" fill="rgba(6,182,212,0.1)" stroke="rgba(6,182,212,0.2)" stroke-width="1"/>
  <text x="563" y="415" text-anchor="middle" fill="#22d3ee" font-family="'SF Pro Text', system-ui, sans-serif" font-size="17" font-weight="600">Compare Prices</text>

  <!-- Stock + Brand -->
  <text x="56" y="465" fill="rgba(248,250,252,0.3)" font-family="'SF Pro Text', system-ui, sans-serif" font-size="14">Brand: Sony</text>
  <circle cx="180" cy="461" r="3" fill="rgba(248,250,252,0.15)"/>
  <text x="192" y="465" fill="#22c55e" font-family="'SF Pro Text', system-ui, sans-serif" font-size="14" font-weight="600">In Stock</text>

  <!-- Assistant panel -->
  <g filter="url(#cardShadow)">
    <rect x="32" y="680" width="736" height="380" rx="24" fill="url(#cardBg)" stroke="rgba(99,102,241,0.15)" stroke-width="1"/>
  </g>

  <!-- Assistant header -->
  <circle cx="72" cy="718" r="20" fill="url(#accent)"/>
  <text x="72" y="724" text-anchor="middle" fill="white" font-family="'SF Pro Text', system-ui, sans-serif" font-size="14" font-weight="700">AI</text>
  <text x="102" y="723" fill="#f8fafc" font-family="'SF Pro Text', system-ui, sans-serif" font-size="18" font-weight="600">VoiceNav Assistant</text>
  <circle cx="712" cy="718" r="5" fill="#22c55e">
    <animate attributeName="opacity" values="1;0.4;1" dur="2.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Chat messages -->
  <rect x="56" y="750" width="480" height="48" rx="16" fill="rgba(99,102,241,0.08)"/>
  <text x="76" y="780" fill="rgba(248,250,252,0.7)" font-family="'SF Pro Text', system-ui, sans-serif" font-size="16">Found 2,341 headphones. Top match:</text>

  <rect x="260" y="810" width="480" height="48" rx="16" fill="rgba(6,182,212,0.08)"/>
  <text x="280" y="840" fill="#22d3ee" font-family="'SF Pro Text', system-ui, sans-serif" font-size="16">Sony WH-1000XM5 at $79.99 — 4.5 stars</text>

  <rect x="56" y="870" width="400" height="48" rx="16" fill="rgba(99,102,241,0.08)"/>
  <text x="76" y="900" fill="rgba(248,250,252,0.7)" font-family="'SF Pro Text', system-ui, sans-serif" font-size="16">Added to cart. Ready to checkout?</text>

  <!-- Suggestions -->
  <text x="56" y="960" fill="rgba(248,250,252,0.2)" font-family="'SF Pro Text', system-ui, sans-serif" font-size="13" font-weight="600" letter-spacing="3">SUGGESTIONS</text>
  <rect x="56" y="975" width="160" height="40" rx="20" fill="rgba(225,29,72,0.1)" stroke="rgba(225,29,72,0.2)" stroke-width="1"/>
  <text x="136" y="1000" text-anchor="middle" fill="#f43f5e" font-family="'SF Pro Text', system-ui, sans-serif" font-size="15" font-weight="600">Checkout</text>
  <rect x="230" y="975" width="180" height="40" rx="20" fill="rgba(6,182,212,0.1)" stroke="rgba(6,182,212,0.2)" stroke-width="1"/>
  <text x="320" y="1000" text-anchor="middle" fill="#22d3ee" font-family="'SF Pro Text', system-ui, sans-serif" font-size="15" font-weight="600">Compare more</text>
  <rect x="424" y="975" width="160" height="40" rx="20" fill="rgba(99,102,241,0.1)" stroke="rgba(99,102,241,0.2)" stroke-width="1"/>
  <text x="504" y="1000" text-anchor="middle" fill="#818cf8" font-family="'SF Pro Text', system-ui, sans-serif" font-size="15" font-weight="600">Read reviews</text>

  <!-- Waveform area -->
  <g filter="url(#cardShadow)">
    <rect x="32" y="1090" width="736" height="110" rx="24" fill="url(#cardBg)" stroke="rgba(99,102,241,0.12)" stroke-width="1"/>
  </g>

  <!-- Waveform bars -->
  <g filter="url(#glow)">
    <rect x="180" y="1125" width="5" height="30" rx="2.5" fill="#22d3ee" opacity="0.4"><animate attributeName="height" values="30;50;30" dur="0.9s" repeatCount="indefinite"/><animate attributeName="y" values="1125;1115;1125" dur="0.9s" repeatCount="indefinite"/></rect>
    <rect x="195" y="1120" width="5" height="40" rx="2.5" fill="#818cf8" opacity="0.5"><animate attributeName="height" values="40;60;40" dur="0.7s" repeatCount="indefinite"/><animate attributeName="y" values="1120;1110;1120" dur="0.7s" repeatCount="indefinite"/></rect>
    <rect x="210" y="1115" width="5" height="50" rx="2.5" fill="#22d3ee" opacity="0.6"><animate attributeName="height" values="50;70;50" dur="0.8s" repeatCount="indefinite"/><animate attributeName="y" values="1115;1105;1115" dur="0.8s" repeatCount="indefinite"/></rect>
    <rect x="225" y="1110" width="5" height="60" rx="2.5" fill="#818cf8" opacity="0.7"><animate attributeName="height" values="60;80;60" dur="0.6s" repeatCount="indefinite"/><animate attributeName="y" values="1110;1100;1110" dur="0.6s" repeatCount="indefinite"/></rect>
    <rect x="240" y="1105" width="5" height="70" rx="2.5" fill="#22d3ee" opacity="0.8"><animate attributeName="height" values="70;85;70" dur="0.75s" repeatCount="indefinite"/><animate attributeName="y" values="1105;1098;1105" dur="0.75s" repeatCount="indefinite"/></rect>
    <rect x="255" y="1110" width="5" height="60" rx="2.5" fill="#818cf8" opacity="0.9"><animate attributeName="height" values="60;75;60" dur="0.65s" repeatCount="indefinite"/><animate attributeName="y" values="1110;1103;1110" dur="0.65s" repeatCount="indefinite"/></rect>
    <rect x="270" y="1115" width="5" height="50" rx="2.5" fill="#22d3ee" opacity="1"><animate attributeName="height" values="50;65;50" dur="0.85s" repeatCount="indefinite"/><animate attributeName="y" values="1115;1108;1115" dur="0.85s" repeatCount="indefinite"/></rect>

    <!-- Center mic -->
    <circle cx="400" cy="1145" r="22" fill="url(#micGrad)"><animate attributeName="r" values="22;25;22" dur="1.5s" repeatCount="indefinite"/></circle>
    <circle cx="400" cy="1145" r="22" fill="none" stroke="#f43f5e" stroke-width="1.5" opacity="0.4"><animate attributeName="r" values="22;32;22" dur="1.5s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.4;0;0.4" dur="1.5s" repeatCount="indefinite"/></circle>
    <rect x="393" y="1133" width="14" height="20" rx="7" fill="white" opacity="0.95"/>
    <path d="M390 1152 Q390 1162 400 1162 Q410 1162 410 1152" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.95"/>
    <line x1="400" y1="1162" x2="400" y2="1168" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.95"/>

    <rect x="505" y="1115" width="5" height="50" rx="2.5" fill="#22d3ee" opacity="1"><animate attributeName="height" values="50;65;50" dur="0.8s" repeatCount="indefinite"/><animate attributeName="y" values="1115;1108;1115" dur="0.8s" repeatCount="indefinite"/></rect>
    <rect x="520" y="1110" width="5" height="60" rx="2.5" fill="#818cf8" opacity="0.9"><animate attributeName="height" values="60;75;60" dur="0.7s" repeatCount="indefinite"/><animate attributeName="y" values="1110;1103;1110" dur="0.7s" repeatCount="indefinite"/></rect>
    <rect x="535" y="1105" width="5" height="70" rx="2.5" fill="#22d3ee" opacity="0.8"><animate attributeName="height" values="70;85;70" dur="0.6s" repeatCount="indefinite"/><animate attributeName="y" values="1105;1098;1105" dur="0.6s" repeatCount="indefinite"/></rect>
    <rect x="550" y="1110" width="5" height="60" rx="2.5" fill="#818cf8" opacity="0.7"><animate attributeName="height" values="60;80;60" dur="0.75s" repeatCount="indefinite"/><animate attributeName="y" values="1110;1100;1110" dur="0.75s" repeatCount="indefinite"/></rect>
    <rect x="565" y="1115" width="5" height="50" rx="2.5" fill="#22d3ee" opacity="0.6"><animate attributeName="height" values="50;70;50" dur="0.85s" repeatCount="indefinite"/><animate attributeName="y" values="1115;1105;1115" dur="0.85s" repeatCount="indefinite"/></rect>
    <rect x="580" y="1120" width="5" height="40" rx="2.5" fill="#818cf8" opacity="0.5"><animate attributeName="height" values="40;60;40" dur="0.65s" repeatCount="indefinite"/><animate attributeName="y" values="1120;1110;1120" dur="0.65s" repeatCount="indefinite"/></rect>
    <rect x="595" y="1125" width="5" height="30" rx="2.5" fill="#22d3ee" opacity="0.4"><animate attributeName="height" values="30;50;30" dur="0.9s" repeatCount="indefinite"/><animate attributeName="y" values="1125;1115;1125" dur="0.9s" repeatCount="indefinite"/></rect>
  </g>

  <!-- Voice command cycling -->
  <text x="400" y="1240" text-anchor="middle" fill="#22d3ee" font-family="'SF Mono', monospace" font-size="22" font-weight="600" opacity="0">
    "add it to cart"
    <animate attributeName="opacity" values="0;0;1;1;0" dur="5s" repeatCount="indefinite"/>
  </text>
  <text x="400" y="1240" text-anchor="middle" fill="#818cf8" font-family="'SF Mono', monospace" font-size="22" font-weight="600">
    "search for headphones"
    <animate attributeName="opacity" values="1;1;0;0;0" dur="5s" repeatCount="indefinite"/>
  </text>

  <!-- Features row -->
  <rect x="32" y="1280" width="175" height="90" rx="18" fill="url(#cardBg)" stroke="rgba(99,102,241,0.1)" stroke-width="1"/>
  <text x="120" y="1318" text-anchor="middle" fill="#818cf8" font-family="'SF Pro Text', system-ui, sans-serif" font-size="13" font-weight="700">116</text>
  <text x="120" y="1340" text-anchor="middle" fill="rgba(248,250,252,0.4)" font-family="'SF Pro Text', system-ui, sans-serif" font-size="11">Languages</text>

  <rect x="222" y="1280" width="175" height="90" rx="18" fill="url(#cardBg)" stroke="rgba(99,102,241,0.1)" stroke-width="1"/>
  <text x="310" y="1318" text-anchor="middle" fill="#22d3ee" font-family="'SF Pro Text', system-ui, sans-serif" font-size="13" font-weight="700">857+</text>
  <text x="310" y="1340" text-anchor="middle" fill="rgba(248,250,252,0.4)" font-family="'SF Pro Text', system-ui, sans-serif" font-size="11">Tests</text>

  <rect x="412" y="1280" width="175" height="90" rx="18" fill="url(#cardBg)" stroke="rgba(99,102,241,0.1)" stroke-width="1"/>
  <text x="500" y="1318" text-anchor="middle" fill="#f43f5e" font-family="'SF Pro Text', system-ui, sans-serif" font-size="13" font-weight="700">100%</text>
  <text x="500" y="1340" text-anchor="middle" fill="rgba(248,250,252,0.4)" font-family="'SF Pro Text', system-ui, sans-serif" font-size="11">On-Device</text>

  <rect x="602" y="1280" width="166" height="90" rx="18" fill="url(#cardBg)" stroke="rgba(99,102,241,0.1)" stroke-width="1"/>
  <text x="685" y="1318" text-anchor="middle" fill="#fbbf24" font-family="'SF Pro Text', system-ui, sans-serif" font-size="13" font-weight="700">25K+</text>
  <text x="685" y="1340" text-anchor="middle" fill="rgba(248,250,252,0.4)" font-family="'SF Pro Text', system-ui, sans-serif" font-size="11">Lines</text>

  <!-- Bottom accent -->
  <rect x="300" y="1410" width="200" height="2" rx="1" fill="url(#accent)" opacity="0.2"/>
  <text x="400" y="1450" text-anchor="middle" fill="rgba(248,250,252,0.15)" font-family="'SF Pro Text', system-ui, sans-serif" font-size="14" letter-spacing="3">POWERED BY HOUSEDEALSGROUP</text>
</svg>
