  <text x="195" y="529" text-anchor="middle" fill="#00E676" font-family="system-ui" font-size="14">&#128176;</text>
  <text x="195" y="556" text-anchor="middle" fill="white" font-family="system-ui" font-size="11" font-weight="600">Compare</text>
  <rect x="260" y="500" width="100" height="72" rx="14" fill="#13132D" stroke="#1a1a3e" stroke-width="1"/>
  <circle cx="310" cy="524" r="14" fill="#4285F420"/>
  <text x="310" y="529" text-anchor="middle" fill="#4285F4" font-family="system-ui" font-size="14">&#128240;</text>
  <text x="310" y="556" text-anchor="middle" fill="white" font-family="system-ui" font-size="11" font-weight="600">Read News</text>
  <rect x="30" y="582" width="100" height="72" rx="14" fill="#13132D" stroke="#1a1a3e" stroke-width="1"/>
  <circle cx="80" cy="606" r="14" fill="#EA433520"/>
  <text x="80" y="611" text-anchor="middle" fill="#EA4335" font-family="system-ui" font-size="14">&#9993;</text>
  <text x="80" y="638" text-anchor="middle" fill="white" font-family="system-ui" font-size="11" font-weight="600">Email</text>
  <rect x="145" y="582" width="100" height="72" rx="14" fill="#13132D" stroke="#1a1a3e" stroke-width="1"/>
  <circle cx="195" cy="606" r="14" fill="#FF000020"/>
  <text x="195" y="611" text-anchor="middle" fill="#FF0000" font-family="system-ui" font-size="14">&#9654;</text>
  <text x="195" y="638" text-anchor="middle" fill="white" font-family="system-ui" font-size="11" font-weight="600">Video</text>
  <rect x="260" y="582" width="100" height="72" rx="14" fill="#13132D" stroke="#1a1a3e" stroke-width="1"/>
  <circle cx="310" cy="606" r="14" fill="#9C27B020"/>
  <text x="310" y="611" text-anchor="middle" fill="#9C27B0" font-family="system-ui" font-size="14">&#128214;</text>
  <text x="310" y="638" text-anchor="middle" fill="white" font-family="system-ui" font-size="11" font-weight="600">Read Page</text>

  <!-- Quick Links -->
  <text x="45" y="690" fill="#7C5CFC" font-family="system-ui" font-size="11" font-weight="700" letter-spacing="2">QUICK LINKS</text>
  <rect x="30" y="700" width="330" height="44" rx="12" fill="#13132D" stroke="#1a1a3e" stroke-width="1"/>
  <text x="70" y="727" fill="white" font-family="system-ui" font-size="13" font-weight="500">Google</text>
  <text x="165" y="727" fill="white" font-family="system-ui" font-size="13" font-weight="500">YouTube</text>
  <text x="265" y="727" fill="white" font-family="system-ui" font-size="13" font-weight="500">Amazon</text>

  <!-- Version badge -->
  <rect x="145" y="770" width="100" height="22" rx="11" fill="#7C5CFC15" stroke="#7C5CFC" stroke-width="0.5"/>
  <text x="195" y="785" text-anchor="middle" fill="#7C5CFC" font-family="system-ui" font-size="10" font-weight="600">v10.0.0</text>

  <rect x="0" y="800" width="390" height="44" fill="#0B0B1E"/>
  <rect x="140" y="808" width="110" height="5" rx="2.5" fill="#333"/>
</svg>
