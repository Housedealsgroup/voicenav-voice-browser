<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0B0B1E"/>
      <stop offset="100%" style="stop-color:#0f0f28"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7C5CFC"/>
      <stop offset="100%" style="stop-color:#00E5FF"/>
    </linearGradient>
    <linearGradient id="micBtnGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF2D78"/>
      <stop offset="100%" style="stop-color:#FF6B9D"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="390" height="844" rx="40" fill="url(#bgGrad)"/>
  <rect x="0" y="0" width="390" height="44" fill="url(#bgGrad)"/>
  <text x="195" y="28" text-anchor="middle" fill="white" font-family="system-ui" font-size="14" font-weight="600">9:41</text>
  <circle cx="340" cy="22" r="4" fill="#00E676"/>

  <!-- Top buttons -->
  <rect x="300" y="50" width="36" height="36" rx="18" fill="#13132D" stroke="#1a1a3e" stroke-width="1"/>
  <text x="318" y="73" text-anchor="middle" fill="#B0B0D0" font-family="system-ui" font-size="14">&#9881;</text>
  <rect x="256" y="50" width="36" height="36" rx="18" fill="#13132D" stroke="#1a1a3e" stroke-width="1"/>
  <text x="274" y="73" text-anchor="middle" fill="#B0B0D0" font-family="system-ui" font-size="14">&#9734;</text>

  <!-- Logo with proper mic icon -->
  <circle cx="195" cy="130" r="45" fill="#7C5CFC" opacity="0.12"/>
  <circle cx="195" cy="130" r="30" fill="#7C5CFC" opacity="0.2"/>
  <rect x="185" y="110" width="20" height="32" rx="10" fill="url(#accentGrad)"/>
  <path d="M180 140 Q180 155 195 155 Q210 155 210 140" fill="none" stroke="url(#accentGrad)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="195" y1="155" x2="195" y2="162" stroke="url(#accentGrad)" stroke-width="2.5" stroke-linecap="round"/>

  <text x="195" y="200" text-anchor="middle" fill="white" font-family="system-ui" font-size="26" font-weight="800" letter-spacing="-0.5">VoiceNav</text>
  <text x="195" y="222" text-anchor="middle" fill="#00E5FF" font-family="system-ui" font-size="12" font-weight="500">Supercomputer-level voice navigation</text>

  <!-- Mic button -->
  <circle cx="195" cy="290" r="48" fill="url(#micBtnGrad)" filter="url(#glow)"/>
  <circle cx="195" cy="290" r="54" stroke="#FF2D78" stroke-width="2" fill="none" opacity="0.3"/>
  <circle cx="195" cy="290" r="62" stroke="#FF2D78" stroke-width="1" fill="none" opacity="0.15"/>
  <rect x="185" y="272" width="20" height="28" rx="10" fill="white"/>
  <path d="M180 298 Q180 310 195 310 Q210 310 210 298" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="195" y1="310" x2="195" y2="316" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="188" y1="316" x2="202" y2="316" stroke="white" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Listening pill -->
  <rect x="120" y="360" width="150" height="32" rx="16" fill="#13132D" stroke="#00E5FF" stroke-width="1" opacity="0.8"/>
  <circle cx="140" cy="376" r="4" fill="#00E5FF">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <text x="175" y="381" text-anchor="middle" fill="#00E5FF" font-family="system-ui" font-size="12" font-weight="500">Listening...</text>

  <!-- URL Input -->
  <rect x="30" y="410" width="330" height="44" rx="22" fill="#13132D" stroke="#1a1a3e" stroke-width="1"/>
