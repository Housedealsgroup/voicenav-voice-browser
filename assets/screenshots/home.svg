  <line x1="59" y1="439" x2="65" y2="445" stroke="#6A6A8A" stroke-width="1.5" stroke-linecap="round"/>
  <text x="75" y="437" fill="#6A6A8A" font-family="system-ui" font-size="13">Enter website or search...</text>

