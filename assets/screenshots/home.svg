<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="100%" stop-color="#0A0A12"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9B5CFF"/>
      <stop offset="100%" stop-color="#C084FC"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="390" height="844" rx="40" fill="url(#bgGrad)"/>

  <!-- Status bar -->
  <rect x="0" y="0" width="390" height="44" fill="#000"/>
  <text x="195" y="28" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="14" font-weight="600">9:41</text>

  <!-- Header -->
  <rect x="0" y="44" width="390" height="52" fill="#0A0A12"/>
  <line x1="0" y1="96" x2="390" y2="96" stroke="#1A1A3A" stroke-width="1"/>
  <!-- VoiceNav icon -->
  <rect x="12" y="56" width="36" height="36" rx="8" fill="transparent"/>
  <rect x="22" y="58" width="6" height="12" rx="3" stroke="#9B5CFF" stroke-width="1.8" fill="none"/>
  <path d="M17 66 a7 7 0 0014 0" stroke="#9B5CFF" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <line x1="24" y1="73" x2="24" y2="78" stroke="#9B5CFF" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Brand name -->
  <text x="195" y="77" text-anchor="middle" fill="url(#accentGrad)" font-family="system-ui, sans-serif" font-size="18" font-weight="700">VoiceNav</text>
  <!-- Voice button -->
  <circle cx="354" cy="72" r="18" fill="#9B5CFF"/>
  <rect x="348" y="62" width="6" height="12" rx="3" fill="white"/>
  <path d="M345 71 a7 7 0 0014 0" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Home Hero -->
  <circle cx="195" cy="160" r="40" fill="rgba(155,92,255,0.08)"/>
  <circle cx="195" cy="160" r="28" fill="rgba(155,92,255,0.12)"/>
  <rect x="185" y="142" width="10" height="22" rx="5" fill="#9B5CFF"/>
  <path d="M182 162 a7 7 0 0014 0" stroke="#9B5CFF" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <line x1="189" y1="169" x2="189" y2="175" stroke="#9B5CFF" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="185" y1="175" x2="193" y2="175" stroke="#9B5CFF" stroke-width="1.8" stroke-linecap="round"/>

  <text x="195" y="220" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="28" font-weight="800">VoiceNav</text>
  <text x="195" y="242" text-anchor="middle" fill="#c0b0d0" font-family="system-ui, sans-serif" font-size="14">Speak to browse the web</text>

  <!-- Search bar -->
  <rect x="30" y="268" width="330" height="44" rx="22" fill="#0A0A12" stroke="#1A1A3A" stroke-width="1"/>
  <circle cx="52" cy="290" r="8" fill="none" stroke="#6a5a8a" stroke-width="1.5"/>
  <line x1="58" y1="296" x2="63" y2="301" stroke="#6a5a8a" stroke-width="1.5" stroke-linecap="round"/>
  <text x="72" y="295" fill="#6a5a8a" font-family="system-ui, sans-serif" font-size="13">Search or type a URL...</text>
  <!-- Voice btn in search -->
  <circle cx="340" cy="290" r="16" fill="#9B5CFF"/>
  <rect x="336" y="282" width="6" height="10" rx="3" fill="white"/>
  <path d="M333 289 a5 5 0 0010 0" stroke="white" stroke-width="1.2" fill="none"/>

  <!-- Tap to speak button -->
  <rect x="110" y="328" width="170" height="44" rx="22" fill="url(#accentGrad)"/>
  <rect x="120" y="336" width="6" height="12" rx="3" fill="white"/>
  <path d="M117 346 a5 5 0 0010 0" stroke="white" stroke-width="1.2" fill="none"/>
  <line x1="122" y1="351" x2="122" y2="355" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
  <text x="165" y="355" fill="white" font-family="system-ui, sans-serif" font-size="14" font-weight="600">Tap to speak</text>

  <text x="195" y="394" text-anchor="middle" fill="#6a5a8a" font-family="system-ui, sans-serif" font-size="12">Say "Go to youtube.com" or "Search for weather"</text>

  <!-- Quick Links Grid -->
  <rect x="30" y="412" width="100" height="68" rx="12" fill="#0A0A12" stroke="#1A1A3A" stroke-width="1"/>
  <circle cx="80" cy="434" r="16" fill="#12122A"/>
  <text x="80" y="439" text-anchor="middle" fill="#4285F4" font-family="system-ui, sans-serif" font-size="14" font-weight="700">G</text>
  <text x="80" y="466" text-anchor="middle" fill="#c0b0d0" font-family="system-ui, sans-serif" font-size="11">Google</text>

  <rect x="145" y="412" width="100" height="68" rx="12" fill="#0A0A12" stroke="#1A1A3A" stroke-width="1"/>
  <circle cx="195" cy="434" r="16" fill="#12122A"/>
  <rect x="189" y="428" width="12" height="12" rx="3" stroke="#FF0000" stroke-width="1.5" fill="none"/>
  <polygon points="193,431 199,435 193,439" fill="#FF0000"/>
  <text x="195" y="466" text-anchor="middle" fill="#c0b0d0" font-family="system-ui, sans-serif" font-size="11">YouTube</text>

  <rect x="260" y="412" width="100" height="68" rx="12" fill="#0A0A12" stroke="#1A1A3A" stroke-width="1"/>
  <circle cx="310" cy="434" r="16" fill="#12122A"/>
  <text x="310" y="439" text-anchor="middle" fill="#636466" font-family="system-ui, sans-serif" font-size="14" font-weight="700">W</text>
  <text x="310" y="466" text-anchor="middle" fill="#c0b0d0" font-family="system-ui, sans-serif" font-size="11">Wikipedia</text>

  <rect x="30" y="490" width="100" height="68" rx="12" fill="#0A0A12" stroke="#1A1A3A" stroke-width="1"/>
  <circle cx="80" cy="512" r="16" fill="#12122A"/>
  <circle cx="76" cy="508" r="2" fill="#FF4500"/>
  <circle cx="84" cy="508" r="2" fill="#FF4500"/>
  <path d="M75 514 s2 3 6 3 6-3 6-3" stroke="#FF4500" stroke-width="1.2" fill="none"/>
  <text x="80" y="544" text-anchor="middle" fill="#c0b0d0" font-family="system-ui, sans-serif" font-size="11">Reddit</text>

  <rect x="145" y="490" width="100" height="68" rx="12" fill="#0A0A12" stroke="#1A1A3A" stroke-width="1"/>
  <circle cx="195" cy="512" r="16" fill="#12122A"/>
  <path d="M190 506 a6 6 0 0010 0 v4 a3 3 0 01-6 0 v-2" stroke="#fff" stroke-width="1.3" fill="none"/>
  <text x="195" y="544" text-anchor="middle" fill="#c0b0d0" font-family="system-ui, sans-serif" font-size="11">GitHub</text>

  <rect x="260" y="490" width="100" height="68" rx="12" fill="#0A0A12" stroke="#1A1A3A" stroke-width="1"/>
  <circle cx="310" cy="512" r="16" fill="#12122A"/>
  <path d="M305 507 h10 l-5 6 5 6 h-10 l5-6z" stroke="#fff" stroke-width="1.2" fill="none"/>
  <text x="310" y="544" text-anchor="middle" fill="#c0b0d0" font-family="system-ui, sans-serif" font-size="11">X</text>

  <!-- Bottom nav -->
  <rect x="0" y="790" width="390" height="54" fill="#0A0A12"/>
  <line x1="0" y1="790" x2="390" y2="790" stroke="#1A1A3A" stroke-width="1"/>
  <text x="65" y="816" text-anchor="middle" fill="#c0b0d0" font-family="system-ui, sans-serif" font-size="10">Bookmarks</text>
  <text x="195" y="816" text-anchor="middle" fill="#c0b0d0" font-family="system-ui, sans-serif" font-size="10">History</text>
  <text x="325" y="816" text-anchor="middle" fill="#c0b0d0" font-family="system-ui, sans-serif" font-size="10">Settings</text>

  <!-- Home indicator -->
  <rect x="140" y="828" width="110" height="5" rx="2.5" fill="#1A1A3A"/>
</svg>
