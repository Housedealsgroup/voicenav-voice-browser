<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" fill="none">
  <rect width="390" height="844" rx="40" fill="#0B0B1E"/>
  <rect x="0" y="0" width="390" height="44" fill="#0B0B1E"/>
  <text x="195" y="28" text-anchor="middle" fill="white" font-family="system-ui" font-size="14" font-weight="600">9:41</text>

  <!-- Task header -->
  <rect x="30" y="60" width="330" height="50" rx="14" fill="#13132D" stroke="#7C5CFC" stroke-width="1.5"/>
  <circle cx="58" cy="85" r="14" fill="#7C5CFC20"/>
  <text x="58" y="90" text-anchor="middle" fill="#7C5CFC" font-family="system-ui" font-size="16">&#9881;</text>
  <text x="85" y="80" fill="#7C5CFC" font-family="system-ui" font-size="10" font-weight="600">ACTIVE TASK</text>
  <text x="85" y="98" fill="white" font-family="system-ui" font-size="14" font-weight="600">Shop for headphones</text>

  <!-- Progress bar -->
  <rect x="30" y="125" width="330" height="8" rx="4" fill="#1a1a3e"/>
  <rect x="30" y="125" width="220" height="8" rx="4" fill="#7C5CFC"/>
  <text x="195" y="150" text-anchor="middle" fill="#B0B0D0" font-family="system-ui" font-size="11">Step 3 of 4</text>

  <!-- Steps -->
  <rect x="30" y="170" width="330" height="50" rx="12" fill="#00E67610" stroke="#00E676" stroke-width="1"/>
  <circle cx="55" cy="195" r="12" fill="#00E676"/>
  <text x="55" y="200" text-anchor="middle" fill="#000" font-family="system-ui" font-size="12" font-weight="700">1</text>
  <text x="80" y="192" fill="#00E676" font-family="system-ui" font-size="10" font-weight="600">COMPLETED</text>
  <text x="80" y="208" fill="white" font-family="system-ui" font-size="12">Go to Amazon</text>

  <rect x="30" y="230" width="330" height="50" rx="12" fill="#00E67610" stroke="#00E676" stroke-width="1"/>
  <circle cx="55" cy="255" r="12" fill="#00E676"/>
  <text x="55" y="260" text-anchor="middle" fill="#000" font-family="system-ui" font-size="12" font-weight="700">2</text>
  <text x="80" y="252" fill="#00E676" font-family="system-ui" font-size="10" font-weight="600">COMPLETED</text>
  <text x="80" y="268" fill="white" font-family="system-ui" font-size="12">Search for headphones</text>

  <rect x="30" y="290" width="330" height="50" rx="12" fill="#7C5CFC10" stroke="#7C5CFC" stroke-width="1.5"/>
  <circle cx="55" cy="315" r="12" fill="#7C5CFC"/>
  <text x="55" y="320" text-anchor="middle" fill="white" font-family="system-ui" font-size="12" font-weight="700">3</text>
  <text x="80" y="312" fill="#7C5CFC" font-family="system-ui" font-size="10" font-weight="600">IN PROGRESS</text>
  <text x="80" y="328" fill="white" font-family="system-ui" font-size="12">Sort by price</text>
  <circle cx="340" cy="315" r="8" fill="#7C5CFC">
    <animate attributeName="opacity" values="1;0.3;1" dur="1s" repeatCount="indefinite"/>
  </circle>

  <rect x="30" y="350" width="330" height="50" rx="12" fill="#13132D" stroke="#1a1a3e" stroke-width="1"/>
  <circle cx="55" cy="375" r="12" fill="#1a1a3e" stroke="#6A6A8A" stroke-width="1"/>
  <text x="55" y="380" text-anchor="middle" fill="#6A6A8A" font-family="system-ui" font-size="12" font-weight="700">4</text>
  <text x="80" y="372" fill="#6A6A8A" font-family="system-ui" font-size="10">PENDING</text>
  <text x="80" y="388" fill="#6A6A8A" font-family="system-ui" font-size="12">Click first result</text>

  <!-- Voice feedback -->
  <rect x="60" y="430" width="270" height="44" rx="22" fill="#13132D" stroke="#00E5FF" stroke-width="1"/>
  <text x="195" y="457" text-anchor="middle" fill="#00E5FF" font-family="system-ui" font-size="12">Sorted by price: low to high</text>

  <!-- Action buttons -->
  <rect x="30" y="500" width="155" height="44" rx="12" fill="#FF2D78"/>
  <text x="107" y="527" text-anchor="middle" fill="white" font-family="system-ui" font-size="12" font-weight="600">Pause Task</text>
  <rect x="205" y="500" width="155" height="44" rx="12" fill="#13132D" stroke="#1a1a3e" stroke-width="1"/>
  <text x="282" y="527" text-anchor="middle" fill="#B0B0D0" font-family="system-ui" font-size="12" font-weight="600">Skip Step</text>

  <!-- Bottom bar -->
  <rect x="0" y="750" width="390" height="94" fill="#0B0B1E"/>
  <rect x="30" y="760" width="330" height="60" rx="16" fill="#13132D"/>
  <text x="85" y="795" text-anchor="middle" fill="#6A6A8A" font-family="system-ui" font-size="10">Home</text>
  <text x="195" y="795" text-anchor="middle" fill="#00E5FF" font-family="system-ui" font-size="10" font-weight="600">Browser</text>
  <text x="305" y="795" text-anchor="middle" fill="#6A6A8A" font-family="system-ui" font-size="10">Settings</text>
</svg>
