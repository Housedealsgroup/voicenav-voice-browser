<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#080818"/>
      <stop offset="100%" stop-color="#0a0a1f"/>
    </linearGradient>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>

  <rect width="390" height="844" rx="40" fill="url(#bgGrad)"/>
  <rect x="0" y="0" width="390" height="44" fill="url(#bgGrad)"/>
  <text x="195" y="28" text-anchor="middle" fill="#f8fafc" font-family="'SF Pro Text', system-ui, sans-serif" font-size="14" font-weight="600">9:41</text>

  <!-- Task header -->
  <g filter="url(#cardShadow)">
    <rect x="30" y="60" width="330" height="50" rx="14" fill="rgba(15,15,35,0.5)" stroke="rgba(233,69,96,0.15)" stroke-width="1.5"/>
  </g>
  <circle cx="58" cy="85" r="14" fill="rgba(233,69,96,0.1)"/>
  <g transform="translate(50,77)"><circle cx="8" cy="8" r="6" fill="none" stroke="#e94560" stroke-width="1.5"/><path d="M8 4 L8 8 L11 10" fill="none" stroke="#e94560" stroke-width="1.2" stroke-linecap="round"/></g>
  <text x="85" y="80" fill="#e94560" font-family="'SF Pro Text', system-ui, sans-serif" font-size="10" font-weight="600">ACTIVE TASK</text>
  <text x="85" y="98" fill="#f8fafc" font-family="'SF Pro Text', system-ui, sans-serif" font-size="14" font-weight="600">Shop for headphones</text>

  <!-- Progress bar -->
  <rect x="30" y="125" width="330" height="6" rx="3" fill="rgba(233,69,96,0.1)"/>
  <rect x="30" y="125" width="220" height="6" rx="3" fill="#e94560"/>
  <text x="195" y="148" text-anchor="middle" fill="#94a3b8" font-family="'SF Pro Text', system-ui, sans-serif" font-size="11">Step 3 of 4</text>

  <!-- Steps -->
  <g filter="url(#cardShadow)">
    <rect x="30" y="170" width="330" height="50" rx="12" fill="rgba(34,197,94,0.06)" stroke="rgba(34,197,94,0.15)" stroke-width="1"/>
  </g>
  <circle cx="55" cy="195" r="12" fill="#22c55e"/>
  <text x="55" y="200" text-anchor="middle" fill="#000" font-family="'SF Pro Text', system-ui, sans-serif" font-size="12" font-weight="700">1</text>
  <text x="80" y="192" fill="#22c55e" font-family="'SF Pro Text', system-ui, sans-serif" font-size="10" font-weight="600">COMPLETED</text>
  <text x="80" y="208" fill="#f8fafc" font-family="'SF Pro Text', system-ui, sans-serif" font-size="12">Go to Amazon</text>

  <g filter="url(#cardShadow)">
    <rect x="30" y="230" width="330" height="50" rx="12" fill="rgba(34,197,94,0.06)" stroke="rgba(34,197,94,0.15)" stroke-width="1"/>
  </g>
  <circle cx="55" cy="255" r="12" fill="#22c55e"/>
  <text x="55" y="260" text-anchor="middle" fill="#000" font-family="'SF Pro Text', system-ui, sans-serif" font-size="12" font-weight="700">2</text>
  <text x="80" y="252" fill="#22c55e" font-family="'SF Pro Text', system-ui, sans-serif" font-size="10" font-weight="600">COMPLETED</text>
  <text x="80" y="268" fill="#f8fafc" font-family="'SF Pro Text', system-ui, sans-serif" font-size="12">Search for headphones</text>

  <g filter="url(#cardShadow)">
    <rect x="30" y="290" width="330" height="50" rx="12" fill="rgba(233,69,96,0.06)" stroke="rgba(233,69,96,0.2)" stroke-width="1.5"/>
  </g>
  <circle cx="55" cy="315" r="12" fill="#e94560"/>
  <text x="55" y="320" text-anchor="middle" fill="#f8fafc" font-family="'SF Pro Text', system-ui, sans-serif" font-size="12" font-weight="700">3</text>
  <text x="80" y="312" fill="#e94560" font-family="'SF Pro Text', system-ui, sans-serif" font-size="10" font-weight="600">IN PROGRESS</text>
  <text x="80" y="328" fill="#f8fafc" font-family="'SF Pro Text', system-ui, sans-serif" font-size="12">Sort by price</text>
  <circle cx="340" cy="315" r="8" fill="#e94560">
    <animate attributeName="opacity" values="1;0.3;1" dur="1s" repeatCount="indefinite"/>
  </circle>

  <g filter="url(#cardShadow)">
    <rect x="30" y="350" width="330" height="50" rx="12" fill="rgba(15,15,35,0.4)" stroke="rgba(233,69,96,0.06)" stroke-width="1"/>
  </g>
  <circle cx="55" cy="375" r="12" fill="rgba(15,15,35,0.6)" stroke="#64748b" stroke-width="1"/>
  <text x="55" y="380" text-anchor="middle" fill="#64748b" font-family="'SF Pro Text', system-ui, sans-serif" font-size="12" font-weight="700">4</text>
  <text x="80" y="372" fill="#64748b" font-family="'SF Pro Text', system-ui, sans-serif" font-size="10">PENDING</text>
  <text x="80" y="388" fill="#64748b" font-family="'SF Pro Text', system-ui, sans-serif" font-size="12">Click first result</text>

  <!-- Voice feedback -->
  <rect x="60" y="430" width="270" height="44" rx="22" fill="rgba(15,15,35,0.5)" stroke="rgba(6,182,212,0.2)" stroke-width="1"/>
  <text x="195" y="457" text-anchor="middle" fill="#22d3ee" font-family="'SF Pro Text', system-ui, sans-serif" font-size="12">Sorted by price: low to high</text>

  <!-- Action buttons -->
  <rect x="30" y="500" width="155" height="44" rx="12" fill="#e11d48"/>
  <text x="107" y="527" text-anchor="middle" fill="#f8fafc" font-family="'SF Pro Text', system-ui, sans-serif" font-size="12" font-weight="600">Pause Task</text>
  <rect x="205" y="500" width="155" height="44" rx="12" fill="rgba(15,15,35,0.5)" stroke="rgba(233,69,96,0.08)" stroke-width="1"/>
  <text x="282" y="527" text-anchor="middle" fill="#94a3b8" font-family="'SF Pro Text', system-ui, sans-serif" font-size="12" font-weight="600">Skip Step</text>

  <!-- Bottom bar -->
  <rect x="0" y="750" width="390" height="94" fill="#080818"/>
  <rect x="30" y="760" width="330" height="60" rx="16" fill="rgba(15,15,35,0.5)"/>
  <text x="85" y="795" text-anchor="middle" fill="#64748b" font-family="'SF Pro Text', system-ui, sans-serif" font-size="10">Home</text>
  <text x="195" y="795" text-anchor="middle" fill="#22d3ee" font-family="'SF Pro Text', system-ui, sans-serif" font-size="10" font-weight="600">Browser</text>
  <text x="305" y="795" text-anchor="middle" fill="#64748b" font-family="'SF Pro Text', system-ui, sans-serif" font-size="10">Settings</text>
</svg>
