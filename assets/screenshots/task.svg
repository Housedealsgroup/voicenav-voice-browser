<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" fill="none">
  <rect width="390" height="844" rx="40" fill="#0a0a0a"/>
  <rect x="0" y="0" width="390" height="44" fill="#0a0a0a"/>
  <text x="195" y="28" text-anchor="middle" fill="white" font-family="system-ui" font-size="14" font-weight="600">9:41</text>

  <!-- Header -->
  <rect x="30" y="60" width="330" height="50" rx="25" fill="#1a1a2e"/>
  <text x="195" y="90" text-anchor="middle" fill="white" font-family="system-ui" font-size="16" font-weight="600">Task Progress</text>

  <!-- Task title -->
  <rect x="30" y="130" width="330" height="70" rx="15" fill="#1a1a2e"/>
  <text x="50" y="160" fill="#00d4ff" font-family="system-ui" font-size="12" font-weight="600">AUTOMATION</text>
  <text x="50" y="185" fill="white" font-family="system-ui" font-size="16" font-weight="600">Shop for headphones</text>

  <!-- Progress steps -->
  <rect x="30" y="220" width="330" height="60" rx="12" fill="#00d4ff" opacity="0.15"/>
  <circle cx="55" cy="250" r="12" fill="#00d4ff"/>
  <text x="55" y="255" text-anchor="middle" fill="white" font-family="system-ui" font-size="12" font-weight="700">1</text>
  <text x="80" y="245" fill="white" font-family="system-ui" font-size="14" font-weight="600">Navigate to Amazon</text>
  <text x="80" y="265" fill="#00d4ff" font-family="system-ui" font-size="12">Complete</text>

  <rect x="30" y="290" width="330" height="60" rx="12" fill="#00d4ff" opacity="0.15"/>
  <circle cx="55" cy="320" r="12" fill="#00d4ff"/>
  <text x="55" y="325" text-anchor="middle" fill="white" font-family="system-ui" font-size="12" font-weight="700">2</text>
  <text x="80" y="315" fill="white" font-family="system-ui" font-size="14" font-weight="600">Search "headphones"</text>
  <text x="80" y="335" fill="#00d4ff" font-family="system-ui" font-size="12">Complete</text>

  <rect x="30" y="360" width="330" height="60" rx="12" fill="#1a1a2e"/>
  <circle cx="55" cy="390" r="12" fill="#ff006e"/>
  <text x="55" y="395" text-anchor="middle" fill="white" font-family="system-ui" font-size="12" font-weight="700">3</text>
  <text x="80" y="385" fill="white" font-family="system-ui" font-size="14" font-weight="600">Sort by price</text>
  <text x="80" y="405" fill="#ff006e" font-family="system-ui" font-size="12">In Progress</text>
  <!-- Spinner -->
  <circle cx="330" cy="390" r="10" stroke="#ff006e" stroke-width="2" fill="none" stroke-dasharray="20 10">
    <animateTransform attributeName="transform" type="rotate" from="0 330 390" to="360 330 390" dur="1s" repeatCount="indefinite"/>
  </circle>

  <rect x="30" y="430" width="330" height="60" rx="12" fill="#1a1a2e"/>
  <circle cx="55" cy="460" r="12" fill="#333"/>
  <text x="55" y="465" text-anchor="middle" fill="#666" font-family="system-ui" font-size="12" font-weight="700">4</text>
  <text x="80" y="455" fill="#666" font-family="system-ui" font-size="14">Read results</text>
  <text x="80" y="475" fill="#444" font-family="system-ui" font-size="12">Pending</text>

  <rect x="30" y="500" width="330" height="60" rx="12" fill="#1a1a2e"/>
  <circle cx="55" cy="530" r="12" fill="#333"/>
  <text x="55" y="535" text-anchor="middle" fill="#666" font-family="system-ui" font-size="12" font-weight="700">5</text>
  <text x="80" y="525" fill="#666" font-family="system-ui" font-size="14">Compare top 3</text>
  <text x="80" y="545" fill="#444" font-family="system-ui" font-size="12">Pending</text>

  <!-- Progress bar -->
  <rect x="30" y="590" width="330" height="8" rx="4" fill="#1a1a2e"/>
  <rect x="30" y="590" width="132" height="8" rx="4" fill="#00d4ff"/>

  <!-- Controls -->
  <rect x="60" y="630" width="80" height="45" rx="22" fill="#1a1a2e"/>
  <text x="100" y="658" text-anchor="middle" fill="#ff006e" font-family="system-ui" font-size="12" font-weight="600">Pause</text>

  <rect x="155" y="630" width="80" height="45" rx="22" fill="#1a1a2e"/>
  <text x="195" y="658" text-anchor="middle" fill="#ff4444" font-family="system-ui" font-size="12" font-weight="600">Cancel</text>

  <rect x="250" y="630" width="80" height="45" rx="22" fill="#1a1a2e"/>
  <text x="290" y="658" text-anchor="middle" fill="#888" font-family="system-ui" font-size="12">Skip</text>

  <!-- Bottom nav -->
  <rect x="0" y="750" width="390" height="94" fill="#0a0a0a"/>
  <rect x="30" y="760" width="330" height="70" rx="20" fill="#1a1a2e"/>
  <text x="85" y="800" text-anchor="middle" fill="#666" font-family="system-ui" font-size="10">Home</text>
  <text x="195" y="800" text-anchor="middle" fill="#00d4ff" font-family="system-ui" font-size="10">Browser</text>
  <text x="305" y="800" text-anchor="middle" fill="#666" font-family="system-ui" font-size="10">Settings</text>
</svg>