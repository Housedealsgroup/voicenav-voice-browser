  <text x="330" y="366" fill="#6A6A8A" font-family="system-ui" font-size="10">&#8599;</text>

  <rect x="35" y="393" width="320" height="44" rx="10" fill="#13132D"/>
  <circle cx="58" cy="415" r="12" fill="#00E67620"/>
