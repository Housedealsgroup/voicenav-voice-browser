  <text x="82" y="307" fill="white" font-family="system-ui" font-size="13" font-weight="600">amazon.co.uk</text>
  <text x="82" y="324" fill="#6A6A8A" font-family="system-ui" font-size="10">United Kingdom</text>
  <text x="330" y="314" fill="#6A6A8A" font-family="system-ui" font-size="10">&#8599;</text>

  <rect x="35" y="341" width="320" height="44" rx="10" fill="#13132D"/>
