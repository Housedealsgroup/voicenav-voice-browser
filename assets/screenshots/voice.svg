<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" fill="none">
  <defs>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9B5CFF"/>
      <stop offset="100%" stop-color="#C084FC"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="390" height="844" rx="40" fill="#000" opacity="0.95"/>

  <text x="195" y="28" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="14" font-weight="600">9:41</text>

  <!-- Mic container with level ring -->
  <circle cx="195" cy="340" r="60" stroke="#9B5CFF" stroke-width="3" fill="none" opacity="0.3" filter="url(#glow)"/>
  <circle cx="195" cy="340" r="52" stroke="#9B5CFF" stroke-width="2" fill="none" opacity="0.15"/>
  <circle cx="195" cy="340" r="42" fill="#9B5CFF" filter="url(#glow)"/>
  <rect x="186" y="318" width="18" height="28" rx="9" fill="white"/>
  <path d="M180 340 a12 12 0 0024 0" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <line x1="192" y1="352" x2="192" y2="360" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="185" y1="360" x2="199" y2="360" stroke="white" stroke-width="2.5" stroke-linecap="round"/>

  <circle cx="195" cy="340" r="65" stroke="#9B5CFF" stroke-width="1.5" fill="none" opacity="0.12">
    <animate attributeName="r" values="65;72;65" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.12;0.06;0.12" dur="1.5s" repeatCount="indefinite"/>
  </circle>

  <text x="195" y="430" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="20" font-weight="600">Listening...</text>

  <rect x="50" y="455" width="290" height="48" rx="12" fill="rgba(255,255,255,0.05)" stroke="#1A1A3A" stroke-width="1"/>
  <text x="195" y="484" text-anchor="middle" fill="#6a5a8a" font-family="system-ui, sans-serif" font-size="16" font-style="italic">Go to youtube...</text>

  <rect x="70" y="516" width="200" height="4" rx="2" fill="#12122A"/>
  <rect x="70" y="516" width="156" height="4" rx="2" fill="#9B5CFF"/>
  <text x="285" y="522" fill="#6a5a8a" font-family="system-ui, sans-serif" font-size="11">78% confident</text>

  <!-- Audio waves -->
  <g transform="translate(152, 548)">
    <rect x="0" y="8" width="4" height="16" rx="2" fill="#9B5CFF" opacity="0.8"><animate attributeName="height" values="8;24;8" dur="0.8s" repeatCount="indefinite"/><animate attributeName="y" values="12;4;12" dur="0.8s" repeatCount="indefinite"/></rect>
    <rect x="8" y="4" width="4" height="24" rx="2" fill="#9B5CFF" opacity="0.7"><animate attributeName="height" values="12;28;12" dur="0.7s" repeatCount="indefinite"/><animate attributeName="y" values="10;2;10" dur="0.7s" repeatCount="indefinite"/></rect>
    <rect x="16" y="6" width="4" height="20" rx="2" fill="#9B5CFF" opacity="0.9"><animate attributeName="height" values="10;26;10" dur="0.9s" repeatCount="indefinite"/><animate attributeName="y" values="11;3;11" dur="0.9s" repeatCount="indefinite"/></rect>
    <rect x="24" y="2" width="4" height="28" rx="2" fill="#9B5CFF"><animate attributeName="height" values="14;30;14" dur="0.6s" repeatCount="indefinite"/><animate attributeName="y" values="9;1;9" dur="0.6s" repeatCount="indefinite"/></rect>
    <rect x="32" y="6" width="4" height="20" rx="2" fill="#9B5CFF" opacity="0.8"><animate attributeName="height" values="10;24;10" dur="0.85s" repeatCount="indefinite"/><animate attributeName="y" values="11;4;11" dur="0.85s" repeatCount="indefinite"/></rect>
    <rect x="40" y="8" width="4" height="16" rx="2" fill="#9B5CFF" opacity="0.6"><animate attributeName="height" values="8;20;8" dur="0.75s" repeatCount="indefinite"/><animate attributeName="y" values="12;6;12" dur="0.75s" repeatCount="indefinite"/></rect>
    <rect x="48" y="10" width="4" height="12" rx="2" fill="#9B5CFF" opacity="0.5"><animate attributeName="height" values="6;16;6" dur="0.95s" repeatCount="indefinite"/><animate attributeName="y" values="13;8;13" dur="0.95s" repeatCount="indefinite"/></rect>
    <rect x="56" y="6" width="4" height="20" rx="2" fill="#9B5CFF" opacity="0.7"><animate attributeName="height" values="10;22;10" dur="0.65s" repeatCount="indefinite"/><animate attributeName="y" values="11;5;11" dur="0.65s" repeatCount="indefinite"/></rect>
    <rect x="64" y="10" width="4" height="12" rx="2" fill="#9B5CFF" opacity="0.6"><animate attributeName="height" values="6;18;6" dur="0.8s" repeatCount="indefinite"/><animate attributeName="y" values="13;7;13" dur="0.8s" repeatCount="indefinite"/></rect>
    <rect x="72" y="8" width="4" height="16" rx="2" fill="#9B5CFF" opacity="0.5"><animate attributeName="height" values="8;14;8" dur="0.9s" repeatCount="indefinite"/><animate attributeName="y" values="12;9;12" dur="0.9s" repeatCount="indefinite"/></rect>
  </g>

  <text x="195" y="600" text-anchor="middle" fill="#6a5a8a" font-family="system-ui, sans-serif" font-size="13">Say a command like "Go to youtube.com" or "Search for weather"</text>

  <rect x="140" y="828" width="110" height="5" rx="2.5" fill="#1A1A3A"/>
</svg>
